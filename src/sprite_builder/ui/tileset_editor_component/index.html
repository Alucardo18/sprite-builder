<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tileset Builder</title>
    <style>
      :root { color-scheme: dark; font-family: ui-sans-serif, system-ui, sans-serif; }
      * { box-sizing: border-box; }
      html, body { margin: 0; background: transparent; color: #f5f7ff; }
      .root { display: grid; gap: 10px; }
      .toolbar {
        position: sticky; top: 0; z-index: 4; display: flex; flex-wrap: wrap;
        align-items: center; gap: 7px; padding: 9px 10px; border-radius: 16px;
        border: 1px solid rgba(132,225,255,.18);
        background: linear-gradient(135deg, rgba(13,18,31,.96), rgba(22,28,44,.96));
        box-shadow: 0 16px 40px rgba(0,0,0,.28);
      }
      .group { display: inline-flex; align-items: center; gap: 6px; padding-right: 8px;
        border-right: 1px solid rgba(255,255,255,.09); }
      .group:last-child { border-right: 0; }
      button, input {
        min-height: 34px; border-radius: 9px; border: 1px solid rgba(255,255,255,.14);
        background: rgba(255,255,255,.06); color: white; font: inherit;
      }
      button { padding: 6px 9px; cursor: pointer; }
      button.icon-button {
        width: 38px; min-width: 38px; padding: 0; display: inline-grid;
        place-items: center; position: relative;
      }
      button.icon-button .icon {
        width: 18px; height: 18px; stroke: currentColor; stroke-width: 1.8;
        stroke-linecap: round; stroke-linejoin: round; fill: none;
      }
      button.icon-button .icon.fill-icon { fill: currentColor; stroke-width: .35; }
      button.icon-button .shortcut {
        position: absolute; right: 2px; bottom: 1px; color: #aeb8cf;
        font: 700 8px/1 ui-monospace, monospace;
      }
      button:hover { border-color: rgba(91,223,255,.44);
        background: rgba(91,223,255,.1); }
      button.active { border-color: rgba(91,223,255,.72);
        background: linear-gradient(120deg, rgba(91,223,255,.2), rgba(124,92,255,.24)); }
      button[aria-pressed="true"] { border-color: rgba(91,223,255,.72);
        background: linear-gradient(120deg, rgba(91,223,255,.2), rgba(124,92,255,.24)); }
      button:disabled { opacity: .35; cursor: default; }
      input[type="number"] { width: 56px; padding: 5px 6px; }
      input[type="color"] { width: 38px; padding: 3px; }
      input.hex-input {
        width: 82px; padding: 5px 7px; text-transform: uppercase;
        font: 700 11px/1 ui-monospace, monospace;
      }
      label { display: inline-flex; align-items: center; gap: 4px; color: #b9c3d8;
        font-size: 11px; font-weight: 700; }
      .tool-group { position: relative; }
      .brush-card {
        position: absolute; z-index: 20; top: calc(100% + 9px); left: 38px;
        width: 228px; display: grid; gap: 9px; padding: 12px;
        border: 1px solid rgba(132,225,255,.28); border-radius: 13px;
        background: linear-gradient(145deg, rgba(15,21,36,.98), rgba(29,36,56,.98));
        box-shadow: 0 18px 44px rgba(0,0,0,.46);
      }
      .brush-card[hidden] { display: none; }
      .brush-card header { display: flex; align-items: center; justify-content: space-between;
        color: #f5f7ff; font-size: 12px; font-weight: 800; }
      .brush-card .brush-row { display: grid; grid-template-columns: 1fr 58px;
        align-items: center; gap: 8px; }
      .brush-card input[type="range"] { width: 100%; min-height: 24px; }
      .wand-control { position: relative; display: inline-flex; }
      .wand-card {
        position: absolute; z-index: 21; top: calc(100% + 9px); left: 0;
        width: min(300px, calc(100vw - 32px)); padding: 14px;
        border: 1px solid rgba(132,225,255,.28); border-radius: 16px;
        background: linear-gradient(145deg, rgba(17,23,39,.98), rgba(10,14,25,.98));
        box-shadow: 0 22px 54px rgba(0,0,0,.42);
      }
      .wand-card[hidden] { display: none; }
      .wand-card-heading, .wand-value-row, .wand-contiguous-row {
        display: flex; align-items: center;
      }
      .wand-card-heading { justify-content: space-between; gap: 12px; margin-bottom: 5px; }
      .wand-card-heading strong { font-size: 13px; }
      .wand-card-heading code { color: #bdefff; }
      .wand-card p { margin: 0 0 12px; color: rgba(220,227,245,.65);
        font-size: 11px; line-height: 1.45; }
      .wand-value-row { justify-content: space-between; gap: 12px; margin-bottom: 7px;
        color: rgba(240,246,255,.9); font-size: 12px; font-weight: 700; }
      .wand-number { width: 58px; padding: 5px 7px; }
      .wand-range { width: 100%; min-height: 24px; accent-color: #5bdfff; cursor: pointer; }
      .wand-scale { display: flex; justify-content: space-between; margin-top: 2px;
        color: rgba(220,227,245,.48); font: 700 9px/1 ui-monospace, monospace; }
      .wand-contiguous-row { gap: 8px; margin-top: 13px; color: rgba(240,246,255,.84);
        font-size: 11px; cursor: pointer; }
      .stage {
        position: relative; height: 710px; overflow: auto; border-radius: 18px;
        border: 1px solid rgba(132,225,255,.2);
        background-color: #202634;
        background-image:
          linear-gradient(45deg,#303849 25%,transparent 25%),
          linear-gradient(-45deg,#303849 25%,transparent 25%),
          linear-gradient(45deg,transparent 75%,#303849 75%),
          linear-gradient(-45deg,transparent 75%,#303849 75%);
        background-size: 16px 16px;
        background-position: 0 0,0 8px,8px -8px,-8px 0;
      }
      .surface { position: relative; margin: 24px; width: max-content; box-shadow: 0 16px 42px #0008; }
      canvas { position: absolute; inset: 0; display: block; image-rendering: pixelated;
        image-rendering: crisp-edges; }
      #image { position: relative; touch-action: none; user-select: none; }
      #overlay { pointer-events: none; }
      .status { margin-left: auto; color: #b9c3d8; font: 700 11px/1.2 ui-monospace, monospace; }
      .swatch { width: 18px; height: 18px; border: 1px solid #fff5; border-radius: 5px; }
      .icon-sprite { position: absolute; width: 0; height: 0; overflow: hidden; }
      .toolbar-label { color: #b9c3d8; font-size: 11px; font-weight: 800; }
      .cursor-ring {
        position: absolute; z-index: 3; display: none; pointer-events: none;
        border: 1px solid rgba(255,255,255,.96); outline: 1px solid rgba(0,0,0,.88);
        transform: translate(-50%, -50%);
      }
      .cursor-ring.visible { display: block; }
      .cursor-ring.crosshair { width: 13px !important; height: 13px !important;
        border-radius: 50%; }
      .cursor-ring.crosshair::before, .cursor-ring.crosshair::after {
        content: ""; position: absolute; background: rgba(255,255,255,.95);
        box-shadow: 0 0 0 1px rgba(0,0,0,.7);
      }
      .cursor-ring.crosshair::before { width: 1px; height: 17px; left: 5px; top: -3px; }
      .cursor-ring.crosshair::after { width: 17px; height: 1px; left: -3px; top: 5px; }
      @media (max-width: 720px) { .stage { height: 560px; } .status { width: 100%; } }
    </style>
  </head>
  <body>
    <svg class="icon-sprite" aria-hidden="true" focusable="false">
      <symbol id="icon-wand" viewBox="0 0 24 24"><path d="M6 21 21 6l-3-3L3 18l3 3"/><path d="m15 6 3 3M9 3a2 2 0 0 0 2 2a2 2 0 0 0-2 2a2 2 0 0 0-2-2a2 2 0 0 0 2-2M19 13a2 2 0 0 0 2 2a2 2 0 0 0-2 2a2 2 0 0 0-2-2a2 2 0 0 0 2-2"/></symbol>
      <symbol id="icon-eyedropper" viewBox="0 0 16 16"><path d="M13.354.646a1.207 1.207 0 0 0-1.708 0L8.5 3.793l-.646-.647a.5.5 0 1 0-.708.708L8.293 5 1.146 12.146A.5.5 0 0 0 1 12.5v1.793l-.854.853a.5.5 0 1 0 .708.707L1.707 15H3.5a.5.5 0 0 0 .354-.146L11 7.707l1.146 1.147a.5.5 0 0 0 .708-.708l-.647-.646 3.147-3.146a1.207 1.207 0 0 0 0-1.708zM2 12.707l7-7L10.293 7l-7 7H2z"/></symbol>
      <symbol id="icon-pencil" viewBox="0 0 24 24"><path d="M4 20h4L18.5 9.5a2.828 2.828 0 1 0-4-4L4 16v4"/><path d="m13.5 6.5 4 4"/></symbol>
      <symbol id="icon-move" viewBox="0 0 24 24"><path d="m18 9 3 3-3 3m-3-3h6M6 9l-3 3 3 3m-3-3h6m0 6 3 3 3-3m-3-3v6m3-15-3-3-3 3m3 3V3"/></symbol>
      <symbol id="icon-eraser" viewBox="0 0 24 24"><path d="m20 20H7.5a2 2 0 0 1-1.4-.6l-2.5-2.5a2 2 0 0 1 0-2.8l8.7-8.7a2 2 0 0 1 2.8 0l5.3 5.3a2 2 0 0 1 0 2.8L14 20"/><path d="m6 14 5 5"/></symbol>
      <symbol id="icon-lasso" viewBox="0 0 24 24"><path d="M7 5c-3 1.6-4.5 4.1-3.8 6.4C4.2 14.8 9 16.5 14 15.5c4.6-.9 7.7-3.7 6.9-6.3-.7-2.4-4.5-3.7-8.7-3.2"/><path d="M8 15.5 4 21h7l3-5.5"/><path d="M10 5.4 13 3"/></symbol>
      <symbol id="icon-rect" viewBox="0 0 24 24"><rect x="5" y="6" width="14" height="12" rx="1.5"/></symbol>
      <symbol id="icon-ellipse" viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="7" ry="5"/></symbol>
      <symbol id="icon-zoom-in" viewBox="0 0 24 24"><circle cx="10.8" cy="10.8" r="6.3"/><path d="m16 16 4.5 4.5M10.8 7.8v6M7.8 10.8h6"/></symbol>
      <symbol id="icon-zoom-out" viewBox="0 0 24 24"><circle cx="10.8" cy="10.8" r="6.3"/><path d="m16 16 4.5 4.5M7.8 10.8h6"/></symbol>
      <symbol id="icon-fit" viewBox="0 0 24 24"><path d="M8 3H3v5M16 3h5v5M21 16v5h-5M3 16v5h5"/><path d="m8 8-5-5m13 5 5-5m-5 13 5 5M8 16l-5 5"/></symbol>
      <symbol id="icon-minus" viewBox="0 0 24 24"><path d="M5 12h14"/></symbol>
      <symbol id="icon-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></symbol>
      <symbol id="icon-reset" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 3v6h6"/></symbol>
      <symbol id="icon-flip-horizontal" viewBox="0 0 24 24"><path d="M3 12h18M7 8l-4 4 4 4M17 8l4 4-4 4M12 4v16"/></symbol>
      <symbol id="icon-flip-vertical" viewBox="0 0 24 24"><path d="M12 3v18M8 7l4-4 4 4M8 17l4 4 4-4M4 12h16"/></symbol>
      <symbol id="icon-grid" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></symbol>
      <symbol id="icon-magnet" viewBox="0 0 24 24"><path d="M6 4v8a6 6 0 0 0 12 0V4M6 8h4M14 8h4"/><path d="M6 4h4v4H6zM14 4h4v4h-4z"/></symbol>
      <symbol id="icon-layers" viewBox="0 0 24 24"><path d="m12 3 9 5-9 5-9-5 9-5Z"/><path d="m3 12 9 5 9-5M3 16l9 5 9-5"/></symbol>
      <symbol id="icon-cut" viewBox="0 0 24 24"><circle cx="6" cy="6" r="2.5"/><circle cx="6" cy="18" r="2.5"/><path d="m8.2 7.4 10.3 9.2M8.2 16.6l3.9-3.5M14.4 11l4.1-3.6"/></symbol>
      <symbol id="icon-undo" viewBox="0 0 24 24"><path d="M9 7 4 12l5 5"/><path d="M5 12h8a6 6 0 0 1 6 6"/></symbol>
      <symbol id="icon-redo" viewBox="0 0 24 24"><path d="m15 7 5 5-5 5"/><path d="M19 12h-8a6 6 0 0 0-6 6"/></symbol>
    </svg>
    <div class="root">
      <div class="toolbar">
        <div class="group">
          <button class="icon-button" id="undo" title="Deshacer (⌘/Ctrl + Z)" aria-label="Deshacer" disabled><svg class="icon"><use href="#icon-undo"></use></svg></button>
          <button class="icon-button" id="redo" title="Rehacer (⌘/Ctrl + Shift + Z)" aria-label="Rehacer" disabled><svg class="icon"><use href="#icon-redo"></use></svg></button>
        </div>
        <div class="group tool-group">
          <span class="toolbar-label">Herramientas</span>
          <div class="wand-control" id="wandControl">
            <button class="icon-button tool-button" data-tool="wand" id="toolWand" title="Varita mágica (W)" aria-label="Varita mágica, atajo W" aria-pressed="false" aria-haspopup="dialog" aria-expanded="false"><svg class="icon"><use href="#icon-wand"></use></svg><span class="shortcut">W</span></button>
            <div class="wand-card" id="wandCard" role="dialog" aria-label="Ajustes de la varita" hidden>
              <div class="wand-card-heading"><strong>Varita mágica</strong><code id="wandToleranceBadge">0</code></div>
              <p><strong>0</strong> selecciona el mismo color. Aumenta la tolerancia para incluir colores RGB cercanos.</p>
              <label class="wand-value-row" for="wandToleranceNumber"><span>Tolerancia</span><input class="wand-number" id="wandToleranceNumber" type="number" min="0" max="255" step="1" value="0" /></label>
              <input class="wand-range" id="wandToleranceRange" type="range" min="0" max="255" step="1" value="0" aria-label="Tolerancia de color" />
              <div class="wand-scale"><span>Exacto · 0</span><span>Amplio · 255</span></div>
              <label class="wand-contiguous-row"><input id="wandContiguous" type="checkbox" checked /> Sólo píxeles conectados</label>
            </div>
          </div>
          <button class="icon-button tool-button" data-tool="pencil" title="Lápiz (P)" aria-label="Lápiz, atajo P" aria-pressed="true"><svg class="icon"><use href="#icon-pencil"></use></svg><span class="shortcut">P</span></button>
          <button class="icon-button tool-button" data-tool="eyedropper" title="Cuentagotas (I)" aria-label="Cuentagotas, atajo I" aria-pressed="false"><svg class="icon fill-icon"><use href="#icon-eyedropper"></use></svg><span class="shortcut">I</span></button>
          <button class="icon-button tool-button" data-tool="eraser" title="Borrador (E)" aria-label="Borrador, atajo E" aria-pressed="false"><svg class="icon"><use href="#icon-eraser"></use></svg><span class="shortcut">E</span></button>
          <button class="icon-button tool-button" data-tool="move" title="Mover selección o atlas (M)" aria-label="Mover selección o atlas, atajo M" aria-pressed="false"><svg class="icon"><use href="#icon-move"></use></svg><span class="shortcut">M</span></button>
          <button class="icon-button tool-button" data-tool="fill" title="Cubeta (F)" aria-label="Cubeta, atajo F" aria-pressed="false"><svg class="icon"><use href="#icon-pencil"></use></svg><span class="shortcut">F</span></button>
          <button class="icon-button tool-button" data-tool="replace_color" title="Reemplazar color" aria-label="Reemplazar color" aria-pressed="false"><svg class="icon fill-icon"><use href="#icon-eyedropper"></use></svg></button>
          <div class="brush-card" id="brushCard" role="dialog" aria-label="Tamaño de herramienta" hidden>
            <header><span id="brushCardTitle">Tamaño del lápiz</span><span id="brushBadge">1 px</span></header>
            <div class="brush-row">
              <input id="brushRange" type="range" min="1" max="32" value="1" aria-label="Tamaño de herramienta" />
              <input id="brush" type="number" min="1" max="32" value="1" aria-label="Tamaño en píxeles" />
            </div>
          </div>
        </div>
        <div class="group">
          <button class="icon-button tool-button" data-tool="crop_lasso" title="Cortar lazo para mover (L)" aria-label="Cortar lazo para mover, atajo L" aria-pressed="false"><svg class="icon"><use href="#icon-lasso"></use></svg><span class="shortcut">L</span></button>
          <button class="icon-button tool-button" data-tool="crop_rect" title="Cortar rectángulo para mover (R)" aria-label="Cortar rectángulo para mover, atajo R" aria-pressed="false"><svg class="icon"><use href="#icon-rect"></use></svg><span class="shortcut">R</span></button>
          <button class="icon-button tool-button" data-tool="crop_ellipse" title="Cortar elipse para mover (O)" aria-label="Cortar elipse para mover, atajo O" aria-pressed="false"><svg class="icon"><use href="#icon-ellipse"></use></svg><span class="shortcut">O</span></button>
          <button class="icon-button tool-button" data-tool="select_lasso" title="Selección lazo" aria-label="Selección lazo" aria-pressed="false"><svg class="icon"><use href="#icon-lasso"></use></svg></button>
          <button class="icon-button tool-button" data-tool="select_rect" title="Selección rectangular" aria-label="Selección rectangular" aria-pressed="false"><svg class="icon"><use href="#icon-rect"></use></svg></button>
          <button class="icon-button tool-button" data-tool="select_ellipse" title="Selección elíptica" aria-label="Selección elíptica" aria-pressed="false"><svg class="icon"><use href="#icon-ellipse"></use></svg></button>
        </div>
        <div class="group">
          <input id="color" type="color" value="#ffffff" title="Color" />
          <span id="swatch" class="swatch"></span>
          <label>HEX <input id="hexColor" class="hex-input" type="text" value="#FFFFFF" maxlength="7" spellcheck="false" aria-label="Color HEX" /></label>
          <label title="Pinta también en el eje horizontal"><input id="symmetryX" type="checkbox" /> ↔</label>
          <label title="Pinta también en el eje vertical"><input id="symmetryY" type="checkbox" /> ↕</label>
          <label title="No pinta sobre píxeles transparentes"><input id="alphaLock" type="checkbox" /> Alpha</label>
        </div>
        <div class="group">
          <button class="icon-button" id="clearSelection" title="Deseleccionar (Esc)" aria-label="Deseleccionar"><svg class="icon"><use href="#icon-cut"></use></svg></button>
          <button class="icon-button" data-pixel-action="flip-horizontal" title="Voltear horizontal" aria-label="Voltear horizontal"><svg class="icon"><use href="#icon-flip-horizontal"></use></svg></button>
          <button class="icon-button" data-pixel-action="flip-vertical" title="Voltear vertical" aria-label="Voltear vertical"><svg class="icon"><use href="#icon-flip-vertical"></use></svg></button>
          <button class="icon-button" data-pixel-action="rotate-cw" title="Rotar 90°" aria-label="Rotar 90 grados"><svg class="icon"><use href="#icon-reset"></use></svg></button>
          <button class="icon-button" data-pixel-action="scale-2x" title="Escalar selección 2× nearest-neighbor" aria-label="Escalar selección al doble"><svg class="icon"><use href="#icon-plus"></use></svg></button>
          <button class="icon-button" data-pixel-action="scale-half" title="Reducir selección ½ nearest-neighbor" aria-label="Reducir selección a la mitad"><svg class="icon"><use href="#icon-minus"></use></svg></button>
          <button class="icon-button" data-pixel-action="outline" title="Contorno de 1 px" aria-label="Crear contorno"><svg class="icon"><use href="#icon-layers"></use></svg></button>
          <button class="icon-button" data-pixel-action="cleanup-isolated" title="Limpiar píxeles aislados" aria-label="Limpiar píxeles aislados"><svg class="icon"><use href="#icon-eraser"></use></svg></button>
        </div>
        <div class="group">
          <button class="icon-button active" id="toggleGrid" title="Mostrar u ocultar guía de tiles" aria-label="Mostrar u ocultar guía de tiles" aria-pressed="true"><svg class="icon"><use href="#icon-grid"></use></svg></button>
          <button class="icon-button active" id="magnetCrop" title="Ajuste magnético del recorte rectangular" aria-label="Ajuste magnético del recorte rectangular" aria-pressed="true"><svg class="icon"><use href="#icon-magnet"></use></svg></button>
          <label>Tile Size <input id="tileSize" type="number" min="1" max="64" /> px</label>
          <label>Off X <input id="offsetX" type="number" min="0" /></label>
          <label>Y <input id="offsetY" type="number" min="0" /></label>
          <label>Gap X <input id="spacingX" type="number" min="0" /></label>
          <label>Y <input id="spacingY" type="number" min="0" /></label>
        </div>
        <div class="group">
          <button class="icon-button" id="zoomOut" title="Alejar" aria-label="Alejar"><svg class="icon"><use href="#icon-zoom-out"></use></svg></button>
          <span id="zoomPill" class="toolbar-label">1×</span>
          <button class="icon-button" id="zoomIn" title="Acercar" aria-label="Acercar"><svg class="icon"><use href="#icon-zoom-in"></use></svg></button>
          <button class="icon-button" id="fit" title="Ajustar al lienzo" aria-label="Ajustar al lienzo"><svg class="icon"><use href="#icon-fit"></use></svg></button>
          <button class="icon-button" id="seamless" title="Previsualizar repetición 3×3" aria-label="Previsualizar repetición"><svg class="icon"><use href="#icon-layers"></use></svg></button>
        </div>
        <span id="status" class="status"></span>
      </div>
      <div id="stage" class="stage">
        <div id="surface" class="surface">
          <canvas id="image" tabindex="0" aria-label="Tileset canvas"></canvas>
          <canvas id="overlay"></canvas>
          <div id="cursorRing" class="cursor-ring"></div>
        </div>
      </div>
    </div>
    <script>
      const SET_COMPONENT_VALUE = "streamlit:setComponentValue";
      const SET_FRAME_HEIGHT = "streamlit:setFrameHeight";
      const RENDER = "streamlit:render";
      const imageCanvas = document.querySelector("#image");
      const overlay = document.querySelector("#overlay");
      const imageCtx = imageCanvas.getContext("2d", { willReadFrequently: true });
      const overlayCtx = overlay.getContext("2d");
      const stage = document.querySelector("#stage");
      const surface = document.querySelector("#surface");
      const cursorRing = document.querySelector("#cursorRing");
      const selectionCanvas = document.createElement("canvas");
      const selectionCtx = selectionCanvas.getContext("2d", { willReadFrequently: true });
      const state = {
        tool: "pencil", zoom: 4, brush: 1, drawing: false, last: null,
        shapeStart: null, shapeEnd: null, shapePath: [], selectionBounds: null,
        undo: [], redo: [], imageToken: "", initialized: false,
        tileSize: 16, offsetX: 0, offsetY: 0, spacingX: 0, spacingY: 0,
        gridVisible: true, magnetCrop: true,
        wandTolerance: 0, wandContiguous: true,
        seamless: false, fitResponsive: true, moveSnapshot: null,
        pointerX: 0, pointerY: 0, pointerVisible: false, lastStrokePoint: null,
        interactionSnapshot: null, selectionSnapshot: null,
        shapeMoved: false, activePointerId: null,
        moveChanged: false,
      };

      function post(type, payload = {}) {
        window.parent.postMessage({ isStreamlitMessage: true, type, ...payload }, "*");
      }
      function setValue(value) { post(SET_COMPONENT_VALUE, { value, dataType: "json" }); }
      function frameHeight() { post(SET_FRAME_HEIGHT, { height: document.body.scrollHeight + 4 }); }
      function clamp(value, min, max) { return Math.max(min, Math.min(max, Number(value) || min)); }
      function eventId() {
        return globalThis.crypto?.randomUUID?.()
          || `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }
      function snapshot() {
        return {
          width: imageCanvas.width,
          height: imageCanvas.height,
          pixels: imageCtx.getImageData(0, 0, imageCanvas.width, imageCanvas.height),
        };
      }
      function restore(value) {
        const geometryChanged = imageCanvas.width !== value.width || imageCanvas.height !== value.height;
