<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>sprite-builder pixel editor</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html, body {
        margin: 0;
        padding: 0;
        background: transparent;
        color: white;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }

      body {
        width: 100%;
      }

      .root {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .toolbar {
        position: sticky;
        top: 0;
        z-index: 3;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 7px;
        padding: 8px 10px;
        border-radius: 16px;
        border: 1px solid rgba(132, 225, 255, 0.18);
        background: linear-gradient(135deg, rgba(13,18,31,0.92), rgba(22,28,44,0.92));
        backdrop-filter: blur(18px) saturate(120%);
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.24);
      }

      .toolgroup {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding-right: 8px;
        border-right: 1px solid rgba(255,255,255,0.08);
        margin-right: 2px;
      }

      .toolgroup:last-child {
        border-right: 0;
        margin-right: 0;
        padding-right: 0;
      }

      .toolgroup[data-group="center"],
      .toolgroup[data-group="cut"] {
        display: none;
      }

      .toolgroup.guide-status {
        gap: 8px;
      }

      body[data-mode="segmentation-center"] .toolgroup[data-group="background"] {
        display: none;
      }

      body[data-mode="segmentation-center"] .toolgroup[data-group="center"] {
        display: inline-flex;
      }

      body[data-mode="segmentation-cut"] .toolgroup[data-group="background"] {
        display: none;
      }

      body[data-mode="segmentation-cut"] .toolgroup[data-group="center"] {
        display: none;
      }

      body[data-mode="segmentation-cut"] .toolgroup[data-group="cut"] {
        display: inline-flex;
      }

      button {
        appearance: none;
        border: 1px solid rgba(255,255,255,0.12);
        background: linear-gradient(120deg, rgba(91,223,255,0.12), rgba(124,92,255,0.18));
        color: #fff;
        min-width: 36px;
        min-height: 36px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        padding: 7px 9px;
        font: inherit;
        font-size: 12px;
        cursor: pointer;
        user-select: none;
      }

      button.active {
        border-color: rgba(91,223,255,0.7);
        background: linear-gradient(120deg, rgba(91,223,255,0.24), rgba(124,92,255,0.28));
        box-shadow: 0 0 0 1px rgba(91,223,255,0.28) inset;
      }

      button.icon-button {
        position: relative;
        gap: 5px;
        padding: 7px;
      }

      button.tool-button {
        min-width: 42px;
      }

      button.icon-button .icon {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        stroke-width: 1.9;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      button.icon-button .icon.fill-icon {
        fill: currentColor;
        stroke: none;
      }

      button.icon-button .shortcut {
        position: absolute;
        right: 3px;
        bottom: 2px;
        color: rgba(220, 227, 245, 0.68);
        font: 700 8px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      .toolbar-label {
        margin: 0 2px 0 1px;
        color: rgba(220, 227, 245, 0.62);
        font: 700 9px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: .08em;
        text-transform: uppercase;
      }

      button:focus-visible {
        outline: 2px solid rgba(91,223,255,0.9);
        outline-offset: 2px;
      }

      .guide-settings {
        position: relative;
      }

      .guide-settings > summary {
        list-style: none;
        cursor: pointer;
        user-select: none;
        border: 1px solid rgba(255,255,255,0.12);
        background: linear-gradient(120deg, rgba(91,223,255,0.12), rgba(124,92,255,0.18));
        border-radius: 12px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        box-sizing: border-box;
        padding: 7px;
        font-size: 12px;
      }

      .guide-settings > summary::-webkit-details-marker {
        display: none;
      }

      .guide-settings > summary:focus-visible {
        outline: 2px solid rgba(91,223,255,0.9);
        outline-offset: 2px;
      }

      .guide-settings > summary .icon {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.9;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .guide-menu {
        position: absolute;
        right: 0;
        top: calc(100% + 8px);
        z-index: 8;
        display: grid;
        gap: 9px;
        min-width: 190px;
        padding: 12px;
        border: 1px solid rgba(132, 225, 255, 0.22);
        border-radius: 14px;
        background: rgba(13, 18, 31, 0.98);
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.36);
      }

      .guide-menu label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        white-space: nowrap;
      }

      .guide-menu input[type="range"] {
        width: 105px;
        accent-color: #5bdfff;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 36px;
        box-sizing: border-box;
        padding: 7px 9px;
        border-radius: 12px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.08);
        font-size: 12px;
      }

      .swatch {
        width: 14px;
        height: 14px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.35);
        box-shadow: 0 0 0 1px rgba(0,0,0,0.3) inset;
      }

      .pill .icon {
        width: 15px;
        height: 15px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.9;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .icon-sprite {
        position: absolute;
        width: 0;
        height: 0;
        overflow: hidden;
      }

      @media (max-width: 620px) {
        .toolbar-label,
        .guide-status,
        .sample-pill {
          display: none !important;
        }

        .toolbar {
          gap: 4px;
          padding: 7px;
        }

        .toolgroup {
          gap: 4px;
          padding-right: 4px;
        }
      }

      .cursor-ring {
        position: absolute;
        left: 0;
        top: 0;
        width: 0;
        height: 0;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.92);
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.35) inset,
          0 0 0 1px rgba(91, 223, 255, 0.65);
        transform: translate(-50%, -50%);
        pointer-events: none;
        opacity: 0;
        z-index: 3;
      }

      .cursor-ring.visible {
        opacity: 1;
      }

      .cursor-ring.mode-crosshair {
        border: 0;
        box-shadow: none;
        background:
          linear-gradient(
            to right,
            transparent calc(50% - 1px),
            rgba(255, 255, 255, 0.95) calc(50% - 1px),
            rgba(255, 255, 255, 0.95) calc(50% + 1px),
            transparent calc(50% + 1px)
          ),
          linear-gradient(
            to bottom,
            transparent calc(50% - 1px),
            rgba(255, 255, 255, 0.95) calc(50% - 1px),
            rgba(255, 255, 255, 0.95) calc(50% + 1px),
            transparent calc(50% + 1px)
          );
      }

      .cursor-ring.mode-crosshair.eyedropper {
        background:
          linear-gradient(
            to right,
            transparent calc(50% - 1px),
            rgba(91, 223, 255, 0.98) calc(50% - 1px),
            rgba(91, 223, 255, 0.98) calc(50% + 1px),
            transparent calc(50% + 1px)
          ),
          linear-gradient(
            to bottom,
            transparent calc(50% - 1px),
            rgba(91, 223, 255, 0.98) calc(50% - 1px),
            rgba(91, 223, 255, 0.98) calc(50% + 1px),
            transparent calc(50% + 1px)
          );
      }

      .cursor-ring.mode-eraser {
        border: 1px solid rgba(255, 196, 91, 0.95);
        background: rgba(255, 196, 91, 0.07);
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.45),
          0 0 0 1px rgba(255, 255, 255, 0.12) inset,
          0 0 8px rgba(255, 196, 91, 0.15);
      }

      .cursor-dot {
        position: absolute;
        left: 0;
        top: 0;
        width: 4px;
        height: 4px;
        margin-left: -2px;
        margin-top: -2px;
        border-radius: 999px;
        background: rgba(91, 223, 255, 0.96);
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.42);
        pointer-events: none;
        z-index: 4;
        opacity: 0;
      }

      .cursor-dot.visible {
        opacity: 1;
      }

      .stage {
        width: 100%;
        height: clamp(380px, 68vh, 900px);
        min-height: 0;
        overflow: auto;
        border-radius: 18px;
        border: 1px solid rgba(132, 225, 255, 0.2);
        background-color: #222837;
        background-image:
          linear-gradient(45deg, #343b4b 25%, transparent 25%),
          linear-gradient(-45deg, #343b4b 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #343b4b 75%),
          linear-gradient(-45deg, transparent 75%, #343b4b 75%);
        background-size: 16px 16px;
        background-position: 0 0, 0 8px, 8px -8px, -8px 0;
        box-shadow: inset 0 0 0 1px rgba(0,0,0,.2), inset 0 18px 42px rgba(0,0,0,.25);
      }

      .canvas-wrap {
        position: relative;
        display: inline-block;
        margin: 18px;
      }

      .guides {
        position: absolute;
        left: 0;
        top: 0;
        pointer-events: none;
        opacity: 0;
        transition: opacity 120ms ease;
        z-index: 2;
        overflow: hidden;
        --guide-opacity: 0.86;
      }

      .guides.visible {
        opacity: var(--guide-opacity);
      }

      .guides [hidden] {
        display: none !important;
      }

      .guide-box {
        position: absolute;
        box-sizing: border-box;
      }

      .guide-box.target {
        border: 1px dashed rgba(91, 223, 255, 1);
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.92),
          inset 0 0 0 1px rgba(0, 0, 0, 0.92);
      }

      .guide-box.frame {
        border: 1px solid rgba(255, 92, 214, 1);
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.92),
          inset 0 0 0 1px rgba(255, 255, 255, 0.28);
      }

      .guide-axis {
        position: absolute;
        display: block;
      }

      .guide-axis.vertical {
        left: 50%;
        top: 0;
        width: 1px;
        height: 100%;
        transform: translateX(-50%);
      }

      .guide-axis.horizontal {
        top: 50%;
        left: 0;
        width: 100%;
        height: 1px;
        transform: translateY(-50%);
      }

      .guide-box.target .guide-axis {
        background: rgba(91, 223, 255, 1);
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.82);
      }

      .guide-box.frame .guide-axis {
        background: rgba(255, 92, 214, 1);
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.82);
      }

      .guide-center {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 7px;
        height: 7px;
        margin-left: -3.5px;
        margin-top: -3.5px;
        border-radius: 999px;
        background: currentColor;
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 1),
          0 0 0 2px rgba(255, 255, 255, 0.72);
      }

      .guide-box.target .guide-center {
        color: rgba(91, 223, 255, 1);
      }

      .guide-box.frame .guide-center {
        color: rgba(255, 92, 214, 1);
      }

      .guide-label {
        position: absolute;
        top: 4px;
        left: 4px;
        padding: 2px 5px;
        border-radius: 5px;
        color: #fff;
        background: rgba(7, 10, 18, 0.9);
        box-shadow: 0 0 0 1px currentColor;
        font: 600 10px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace;
        white-space: nowrap;
      }

      .guide-box.target .guide-label {
        color: rgba(91, 223, 255, 1);
      }

      .guide-box.frame .guide-label {
        color: rgba(255, 92, 214, 1);
      }

      .guide-anchor {
        position: absolute;
        width: 11px;
        height: 11px;
        margin: -5.5px 0 0 -5.5px;
        border-radius: 999px;
        box-sizing: border-box;
      }

      .guide-anchor::before,
      .guide-anchor::after {
        content: "";
        position: absolute;
        background: currentColor;
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.9);
      }

      .guide-anchor::before {
        left: 5px;
        top: -5px;
        width: 1px;
        height: 21px;
      }

      .guide-anchor::after {
        left: -5px;
        top: 5px;
        width: 21px;
        height: 1px;
      }

      .guide-anchor.target {
        color: rgba(255, 196, 91, 1);
        border: 2px solid rgba(255, 196, 91, 1);
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 1);
      }

      .guide-anchor.current {
        color: rgba(129, 255, 166, 1);
        border: 2px solid rgba(129, 255, 166, 1);
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 1);
      }

      .guide-ground {
        position: absolute;
        left: 0;
        width: 100%;
        height: 1px;
        background: rgba(129, 255, 166, 1);
        box-shadow:
          0 -1px 0 rgba(0, 0, 0, 0.9),
          0 1px 0 rgba(0, 0, 0, 0.9);
      }

      .guide-ground .guide-label {
        top: -19px;
        left: 6px;
        color: rgba(129, 255, 166, 1);
      }

      .cut-guides {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0;
        transition: opacity 120ms ease;
        z-index: 3;
      }

      .cut-guides.visible {
        opacity: 1;
      }

      .cut-boundary {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 1px;
        background: rgba(76, 224, 255, 0.95);
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.85);
      }

      .cut-boundary.horizontal {
        left: 0;
        right: 0;
        top: auto;
        bottom: auto;
        width: auto;
        height: 1px;
      }

      .cut-boundary .cut-handle {
        position: absolute;
        left: 50%;
        top: 0;
        bottom: 0;
        width: 14px;
        transform: translateX(-50%);
        pointer-events: auto;
        cursor: col-resize;
      }

      .cut-boundary.horizontal .cut-handle {
        left: 0;
        right: 0;
        top: 50%;
        bottom: auto;
        width: auto;
        height: 14px;
        transform: translateY(-50%);
        cursor: row-resize;
      }

      .cut-boundary .cut-handle::before {
        content: "";
        position: absolute;
        left: 50%;
        top: 0;
        bottom: 0;
        width: 3px;
        transform: translateX(-50%);
        background: rgba(255, 196, 91, 0.16);
      }

      .cut-boundary.horizontal .cut-handle::before {
        left: 0;
        right: 0;
        top: 50%;
        bottom: auto;
        width: auto;
        height: 3px;
        transform: translateY(-50%);
      }

      .cut-boundary.active {
        background: rgba(255, 196, 91, 1);
      }

      .cut-boundary.active .cut-handle::before {
        background: rgba(255, 196, 91, 0.34);
      }

      .cut-boundary.ghost {
        width: 3px;
        margin-left: -1px;
        pointer-events: none;
        background: rgba(255, 196, 91, 0.5);
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.92),
          0 0 10px rgba(255, 196, 91, 0.48);
        z-index: 6;
        will-change: left, top;
      }

      .cut-boundary.ghost.horizontal {
        width: auto;
        height: 3px;
        margin-left: 0;
        margin-top: -1px;
      }

      .cut-ghost-label {
        position: absolute;
        top: 8px;
        left: 8px;
        padding: 3px 6px;
        border: 1px solid rgba(255, 196, 91, 0.8);
        border-radius: 4px;
        background: rgba(7, 8, 14, 0.92);
        color: rgba(255, 222, 160, 1);
        font: 700 10px/1 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        letter-spacing: 0.02em;
        white-space: nowrap;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.55);
      }

      .cut-boundary.ghost.horizontal .cut-ghost-label {
        top: 8px;
        left: 8px;
      }

      canvas {
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        outline: none;
        border-radius: 4px;
        touch-action: none;
      }

      body[data-mode="segmentation-center"] canvas {
        cursor: grab;
      }

      body[data-mode="segmentation-center"] canvas.dragging {
        cursor: grabbing;
      }

      body[data-mode="background"] canvas {
        cursor: none;
      }

      .overlay-note {
        margin-top: 8px;
        font-size: 12px;
        line-height: 1.4;
        color: rgba(220, 227, 245, 0.8);
      }

      /*
       * Studio deliberately switches from a "control above a preview" layout to
       * a small application workspace.  The host owns its surrounding panels;
       * inside the component the stage gets every remaining pixel and tools stay
       * beside (not above) the artwork, like a pixel editor should.
       */
      .studio-timeline {
        display: none;
      }

      body[data-mode="layer-edit"] .root {
        display: grid;
        grid-template-columns: 62px minmax(0, 1fr);
        grid-template-rows: minmax(0, 1fr) auto auto;
        column-gap: 10px;
        row-gap: 8px;
        min-height: 0;
      }

      body[data-mode="layer-edit"] .toolbar {
        position: relative;
        top: auto;
        grid-column: 1;
        grid-row: 1 / span 3;
        align-self: stretch;
        flex-direction: column;
        flex-wrap: nowrap;
        justify-content: flex-start;
        gap: 8px;
        min-width: 0;
        padding: 8px;
        overflow-x: hidden;
        overflow-y: auto;
        border-radius: 16px;
      }

      body[data-mode="layer-edit"] .toolbar .toolgroup {
        flex-direction: column;
        width: 100%;
        gap: 6px;
        margin: 0;
        padding: 0 0 8px;
        border-right: 0;
        border-bottom: 1px solid rgba(255,255,255,0.09);
      }

      body[data-mode="layer-edit"] .toolbar .toolgroup:last-child {
        padding-bottom: 0;
        border-bottom: 0;
      }

      body[data-mode="layer-edit"] .toolbar .toolbar-label,
      body[data-mode="layer-edit"] .toolbar .shortcut,
      body[data-mode="layer-edit"] .toolbar .sample-pill .pill > span:not(.swatch),
      body[data-mode="layer-edit"] .toolbar .toolgroup .pill > svg + span {
        display: none;
      }

      body[data-mode="layer-edit"] .toolbar button,
      body[data-mode="layer-edit"] .toolbar .pill {
        width: 42px;
        min-width: 42px;
        min-height: 42px;
        padding: 7px;
        box-sizing: border-box;
      }

      body[data-mode="layer-edit"] .toolbar .pill {
        justify-content: center;
      }

      body[data-mode="layer-edit"] .toolbar .sample-pill .pill {
        background: rgba(255,255,255,0.07);
      }

      body[data-mode="layer-edit"] .toolbar #zoom-pill .icon,
      body[data-mode="layer-edit"] .toolbar #brush-radius .icon {
        display: none;
      }

      body[data-mode="layer-edit"] .toolbar #zoom-pill > span:last-child,
      body[data-mode="layer-edit"] .toolbar #brush-radius > span:last-child {
        display: inline;
        color: rgba(220, 227, 245, 0.82);
        font: 700 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      body[data-mode="layer-edit"] .toolbar #commit-edits #pending-edits {
        display: none;
      }

      body[data-mode="layer-edit"] .toolbar #commit-edits[data-pending]:not([data-pending="0"])::after {
        content: attr(data-pending);
        position: absolute;
        right: 2px;
        bottom: 2px;
        min-width: 12px;
        height: 12px;
        padding: 0 2px;
        border-radius: 999px;
        color: #111826;
        background: #ffc45b;
        font: 800 8px/12px ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      body[data-mode="layer-edit"] .toolbar .swatch {
        width: 19px;
        height: 19px;
      }

      body[data-mode="layer-edit"] .stage {
        grid-column: 2;
        grid-row: 1;
        width: auto;
        height: clamp(440px, 68vh, 920px);
        min-height: 0;
        min-width: 0;
        display: grid;
        place-items: center;
        box-sizing: border-box;
        padding: 24px;
        border-radius: 18px;
        background-size: 18px 18px;
      }

      body[data-mode="layer-edit"] .canvas-wrap {
        flex: 0 0 auto;
        margin: 0;
      }

      body[data-mode="layer-edit"] .studio-timeline:not([hidden]) {
        grid-column: 2;
        grid-row: 2;
        display: grid;
        gap: 7px;
        min-width: 0;
        padding: 9px 11px;
        border: 1px solid rgba(132, 225, 255, 0.17);
        border-radius: 14px;
        background: rgba(13, 18, 31, 0.74);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.16);
      }

      body[data-mode="layer-edit"] .overlay-note {
        grid-column: 2;
        grid-row: 3;
        margin: 0 4px;
      }

      .timeline-heading,
      .timeline-row,
      .timeline-cels {
        display: flex;
        align-items: center;
      }

      .timeline-heading {
        justify-content: space-between;
        gap: 12px;
        color: rgba(220, 227, 245, 0.68);
        font: 700 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: .08em;
        text-transform: uppercase;
      }

      .timeline-rows {
        display: grid;
        gap: 4px;
        min-width: 0;
        max-height: 112px;
        overflow: auto;
      }

      .timeline-row {
        position: relative;
        gap: 8px;
        min-width: max-content;
        border-radius: 8px;
      }

      .timeline-row[draggable="true"] {
        cursor: grab;
      }

        background: rgba(91, 223, 255, 0.13);
        border-color: rgba(91, 223, 255, 0.32);
      }

      button.timeline-layer-name {
        appearance: none;
        min-width: 128px;
        min-height: 24px;
        justify-content: flex-start;
        display: inline-flex;
        align-items: center;
        width: 128px;
        height: 24px;
        padding: 0 8px;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 7px;
        color: rgba(220, 227, 245, 0.78);
        background: rgba(255,255,255,0.035);
        font-size: 11px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      button.timeline-layer-name:focus-visible,
      button.timeline-cel:focus-visible {
        outline: 2px solid rgba(255, 196, 91, 0.96);
        outline-offset: 1px;
      }

      .timeline-cels {
        gap: 3px;
      }

      button.timeline-cel {
        appearance: none;
        display: block;
        width: 24px;
        min-width: 24px;
        height: 24px;
        min-height: 24px;
        padding: 0;
        box-sizing: border-box;
        border: 1px solid rgba(255,255,255,0.09);
        border-radius: 5px;
        background: rgba(255,255,255,0.035);
        cursor: pointer;
      }

      .timeline-cel.has-cel {

            edits: state.pendingEdits.slice(),
            redo: state.pendingRedoEdits.slice(),
          });
        }
        const pendingContext = pendingEditsByContext.get(nextContext);
        state.pendingEdits = Array.isArray(pendingContext)
          ? pendingContext.slice()

        state.pendingRedoEdits = Array.isArray(pendingContext)
          ? []

      function stopPlayback() {
        if (state.playbackTimer) {

      function togglePlayback() {
        if (state.playbackTimer) {

        if (!state.animationFrames.length) {

        state.playbackIndex = Math.max(0, Math.min(state.animationFrames.length - 1, state.activeFrame));
        timelinePlayButton.textContent = "■";
        timelinePlayButton.setAttribute("aria-label", "Detener animación");
        const advance = () => {
          if (!state.playbackTimer) {
            return;
          }
          state.playbackIndex = (state.playbackIndex + 1) % state.animationFrames.length;
          scheduleDraw();
          const duration = state.animationDurations[state.playbackIndex]
            || Math.round(1000 / state.animationFps);
          state.playbackTimer = setTimeout(advance, Math.max(16, duration));
        };
        const firstDuration = state.animationDurations[state.playbackIndex]
          || Math.round(1000 / state.animationFps);
        state.playbackTimer = setTimeout(advance, Math.max(16, firstDuration));
        scheduleDraw();

        send(COMPONENT_READY, { apiVersion: 1 });

        const nextValue = state.mode === "segmentation-center"

        send(SET_COMPONENT_VALUE, { value: nextValue });

      function emitHistory(action) {
        if (action === "undo" && state.pendingEdits.length) {
          state.pendingRedoEdits.push(state.pendingEdits.pop());
          updatePendingEdits();
          draw();
          return;
        }
        if (action === "redo" && state.pendingRedoEdits.length) {
          state.pendingEdits.push(state.pendingRedoEdits.pop());
          updatePendingEdits();
          draw();
          return;
        }
        if ((action === "undo" && !state.canUndo) || (action === "redo" && !state.canRedo)) {
          return;
        }
        emitValue({
          eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          type: "history",
          action,
          mode: state.mode,
        });
      }

        historyRedoButton.disabled = !state.canRedo && state.pendingRedoEdits.length === 0;

        const stageHeight = Math.ceil(stage.getBoundingClientRect().height || 0);
        const timelineHeight = Math.ceil(studioTimeline?.getBoundingClientRect().height || 0);
        const noteHeight = Math.ceil(document.querySelector(".overlay-note")?.getBoundingClientRect().height || 0);
        const height = Math.max(480, toolbarHeight + stageHeight + timelineHeight + noteHeight + 32);

      function loadImage(url) {
        return new Promise((resolve, reject) => {
          if (!url) {
            resolve(null);
            return;
          }
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = reject;
          image.src = url;
        });
      }

      function normalizeTool(tool) {
        return tool === "brush" ? "eraser" : tool;
      }

      function normalizeMode(mode) {
        if (mode === "segmentation-center") {
          return "segmentation-center";
        }
        if (mode === "segmentation-cut") {
          return "segmentation-cut";
        }
        if (mode === "layer-edit") {
          return "layer-edit";
        }
        return "background";
      }

      function finiteNumber(value, fallback = null) {
        const parsed = Number(value);
        return Number.isFinite(parsed) ? parsed : fallback;
      }

      function hasOwn(object, property) {
        return Object.prototype.hasOwnProperty.call(object, property);
      }

      function firstFinite(args, names, fallback = null) {
        for (const name of names) {
          if (hasOwn(args, name)) {
            const value = finiteNumber(args[name], null);
            if (value !== null) {
              return value;
            }
          }
        }
        return fallback;
      }

      function setBoxGeometry(element, x, y, width, height) {
        element.style.left = `${Math.round(x * state.zoom)}px`;
        element.style.top = `${Math.round(y * state.zoom)}px`;
        element.style.width = `${Math.max(1, Math.round(width * state.zoom))}px`;
        element.style.height = `${Math.max(1, Math.round(height * state.zoom))}px`;
      }

      function setPointGeometry(element, x, y) {
        element.style.left = `${Math.round((x + 0.5) * state.zoom)}px`;
        element.style.top = `${Math.round((y + 0.5) * state.zoom)}px`;
      }

      function currentAnchorPosition() {
        if (state.currentAnchorX === null || state.currentAnchorY === null) {
          return null;
        }
        return {
          x: state.currentAnchorX + (state.offsetX - state.anchorOffsetX),
          y: state.currentAnchorY + (state.offsetY - state.anchorOffsetY),
        };
      }

      function guideDelta() {
        const currentAnchor = currentAnchorPosition();
        const hasAnchorTarget = state.targetAnchorX !== null && state.targetAnchorY !== null;
        if (state.showAnchorDelta && currentAnchor && hasAnchorTarget) {
          const anchorDeltaX = Math.round(
            state.currentAnchorX + state.offsetX - state.anchorOffsetX - state.targetAnchorX,
          );
          const anchorDeltaY = Math.round(
            state.currentAnchorY + state.offsetY - state.anchorOffsetY - state.targetAnchorY,
          );
          return {
            x: Math.round(currentAnchor.x - state.targetAnchorX),
            y: Math.round(currentAnchor.y - state.targetAnchorY),
            anchor: true,
            anchorDeltaX,
            anchorDeltaY,
          };
        }
        return {
          x: Math.round(state.offsetX - state.homeOffsetX),
          y: Math.round(state.offsetY - state.homeOffsetY),
          anchor: false,
        };

      function isCropTool(tool) {
        return tool === "crop_lasso" || tool === "crop_rect" || tool === "crop_ellipse";

      function setObjectOffset(x, y, emit = false) {
        state.offsetX = Math.round(Number.isFinite(x) ? x : 0);
        state.offsetY = Math.round(Number.isFinite(y) ? y : 0);
        scheduleDraw();
        if (emit) {

            offsetX: state.offsetX,
            offsetY: state.offsetY,
            mode: state.mode,
            imageUrl: state.imageUrl,
            overlayUrl: state.overlayUrl,
            frameToken: state.frameToken,
            createdAt: Date.now(),

          const delta = guideDelta();
          emitValue({
            eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
            type: "transform",
            action: "offset",
            mode: state.mode,
            offsetX: state.offsetX,
            offsetY: state.offsetY,
            deltaX: delta.x,
            deltaY: delta.y,
          });
        }
      }

      function captureFrameState() {
        return {
          zoom: state.zoom,
          offsetX: state.offsetX,
          offsetY: state.offsetY,
          tool: state.tool,
          brushRadius: state.brushRadius,
          showGuides: state.showGuides,

          showCellCenter: state.showCellCenter,

          showAutocenter: state.showAutocenter,
          showAutocrop: state.showAutocrop,
          cutPositions: state.cutPositions.slice(),
          allowCutDrag: state.allowCutDrag,

      function restoreFrameState(snapshot, args) {
        if (!snapshot) {
          return false;
        }
        state.zoom = Math.max(1, Math.round(Number(snapshot.zoom || args.zoom || state.zoom || 8)));
        state.offsetX = Math.round(Number.isFinite(snapshot.offsetX) ? snapshot.offsetX : state.offsetX);
        state.offsetY = Math.round(Number.isFinite(snapshot.offsetY) ? snapshot.offsetY : state.offsetY);
        state.tool = normalizeTool(String(snapshot.tool || args.tool || state.tool || "wand"));
        state.brushRadius = Math.max(1, Math.round(Number(snapshot.brushRadius || args.brushRadius || state.brushRadius || 5)));
        state.showGuides = !!snapshot.showGuides;
        state.guideOpacity = Math.max(0.1, Math.min(1, Number(snapshot.guideOpacity || state.guideOpacity || 0.85)));
        state.showCellCenter = !!snapshot.showCellCenter;
        state.showFrameGuide = !!snapshot.showFrameGuide;
        state.showBodyAnchor = !!snapshot.showBodyAnchor;
        state.showTargetAnchor = !!snapshot.showTargetAnchor;
        state.showGroundLine = !!snapshot.showGroundLine;
        state.groundLineY = Number.isFinite(snapshot.groundLineY) ? snapshot.groundLineY : null;
        state.showAnchorDelta = !!snapshot.showAnchorDelta;
        state.allowDrag = !!snapshot.allowDrag;
        state.showAutocenter = !!snapshot.showAutocenter;
        state.showAutocrop = !!snapshot.showAutocrop;
        state.cutPositions = Array.isArray(snapshot.cutPositions)
          ? snapshot.cutPositions.map((value) => Math.round(Number(value)))
          : state.cutPositions;
        state.allowCutDrag = !!snapshot.allowCutDrag;
        return true;
      }

      function setGuidesVisible(visible, announce = false) {
        state.showGuides = !!visible;
        updateModeUI();
        updateGuidesGeometry();
        if (announce) {
          emitValue({
            eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
            type: "toolbar",
            action: "toggle-guides",
            mode: state.mode,
            showGuides: state.showGuides,
          });
        }
      }

      function setGuideOpacity(value, announce = false) {
        state.guideOpacity = Math.max(0.1, Math.min(1, finiteNumber(value, 0.85)));
        const percent = Math.round(state.guideOpacity * 100);
        guides.style.setProperty("--guide-opacity", String(state.guideOpacity));
        guides.style.opacity = state.mode === "segmentation-cut"
          ? "1"
          : state.mode === "segmentation-center" && state.showGuides
            ? String(state.guideOpacity)
            : "0";
        guideOpacity.value = String(percent);
        guideOpacityValue.textContent = `${percent}%`;
        if (announce) {
          emitValue({
            eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
            type: "toolbar",
            action: "guide-opacity",
            mode: state.mode,
            guideOpacity: state.guideOpacity,
          });
        }
      }

      function setBrushRadius(value, announce = false) {
        const next = Math.max(1, Math.min(48, Math.round(value)));
        state.brushRadius = next;
        document.getElementById("brush-radius").textContent = `${next}px`;
        if (announce) {
          emitValue({
            eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
            type: "toolbar",
            action: "brush-radius",
            brushRadius: next,
          });
        }
        updateCursor();
      }

      function updateCursor() {
        const centerMode = state.mode === "segmentation-center";
        const cutMode = state.mode === "segmentation-cut";
        const layerMove = state.mode === "layer-edit" && state.tool === "move";
        const size = state.tool === "eraser"
          ? Math.max(1, (state.brushRadius * 2 + 1) * state.zoom)
          : Math.max(12, Math.round(state.zoom * 1.5));
        cursorRing.style.width = `${size}px`;
        cursorRing.style.height = `${size}px`;
        const centerX = state.pointerPixelX * state.zoom + state.zoom / 2;
        const centerY = state.pointerPixelY * state.zoom + state.zoom / 2;
        cursorRing.style.left = `${centerX}px`;
        cursorRing.style.top = `${centerY}px`;
        cursorDot.style.left = `${centerX}px`;
        cursorDot.style.top = `${centerY}px`;
        const visible = state.pointerVisible;
        const crosshair = state.tool === "wand" || state.tool === "eyedropper" || state.tool === "pencil" || state.tool === "fill" || state.tool === "replace_color" || isShapeTool(state.tool);
        const eraser = state.tool === "eraser";
        cursorRing.classList.toggle("visible", visible && !cutMode);
        cursorDot.classList.toggle("visible", visible && crosshair && !centerMode && !cutMode);
        cursorRing.classList.toggle("mode-crosshair", crosshair);
        cursorRing.classList.toggle("mode-eraser", eraser);
        cursorRing.classList.toggle("eyedropper", state.tool === "eyedropper");
        cursorRing.classList.toggle("wand", state.tool === "wand");
        canvas.classList.toggle("dragging", centerMode && state.dragging);
        canvas.style.cursor = centerMode || layerMove
          ? (state.dragging ? "grabbing" : "grab")
          : cutMode
            ? "default"
            : "none";
      }

      function updateGuidesGeometry() {
        const centerMode = state.mode === "segmentation-center";
        const overlayWidth = state.overlay?.width || state.width;
        const overlayHeight = state.overlay?.height || state.height;
        guides.style.left = "0px";
        guides.style.top = "0px";
        guides.style.width = `${Math.max(1, Math.round(state.width * state.zoom))}px`;
        guides.style.height = `${Math.max(1, Math.round(state.height * state.zoom))}px`;
        if (!centerMode) {
          return;
        }

        setBoxGeometry(
          guideTarget,
          state.homeOffsetX,
          state.homeOffsetY,
          overlayWidth,
          overlayHeight,
        );
        setBoxGeometry(
          guideFrame,
          state.offsetX,
          state.offsetY,
          overlayWidth,
          overlayHeight,
        );
        guideTarget.hidden = !state.showCellCenter;
        guideFrame.hidden = !state.showFrameGuide;

        const currentAnchor = currentAnchorPosition();
        const hasCurrentAnchor = !!currentAnchor;
        const hasTargetAnchor = state.targetAnchorX !== null && state.targetAnchorY !== null;
        guideCurrentAnchor.hidden = !state.showBodyAnchor || !hasCurrentAnchor;
        guideTargetAnchor.hidden = !state.showTargetAnchor || !hasTargetAnchor;
        if (hasCurrentAnchor) {
          const currentAnchorScreenX = (
            state.currentAnchorX + state.offsetX - state.anchorOffsetX + 0.5
          ) * state.zoom;
          const currentAnchorScreenY = (
            state.currentAnchorY + state.offsetY - state.anchorOffsetY + 0.5
          ) * state.zoom;
          setPointGeometry(guideCurrentAnchor, currentAnchor.x, currentAnchor.y);
          guideCurrentAnchor.dataset.screenX = String(Math.round(currentAnchorScreenX));
          guideCurrentAnchor.dataset.screenY = String(Math.round(currentAnchorScreenY));
        }
        if (hasTargetAnchor) {
          const targetAnchorScreenX = (state.targetAnchorX + 0.5) * state.zoom;
          const targetAnchorScreenY = (state.targetAnchorY + 0.5) * state.zoom;
          setPointGeometry(
            guideTargetAnchor,
            state.targetAnchorX,
            state.targetAnchorY
          );
          guideTargetAnchor.dataset.screenX = String(Math.round(targetAnchorScreenX));
          guideTargetAnchor.dataset.screenY = String(Math.round(targetAnchorScreenY));
        }

        const fallbackGround = state.homeOffsetY + overlayHeight - 1;
        const groundY = state.groundLineY === null ? fallbackGround : state.groundLineY;
        guideGround.hidden = !state.showGroundLine;
        guideGround.style.top = `${Math.round((groundY + 0.5) * state.zoom)}px`;

        const delta = guideDelta();
        deltaPill.textContent = `${delta.anchor ? "Anchor " : ""}ΔX ${delta.x} · ΔY ${delta.y}`;
        deltaPill.title = delta.anchor
          ? "Current body anchor relative to target body anchor"
          : "Moving frame relative to its target cell";

        guideTargetLayer.checked = state.showCellCenter;
        guideFrameLayer.checked = state.showFrameGuide;
        guideCurrentAnchorLayer.checked = state.showBodyAnchor;
        guideTargetAnchorLayer.checked = state.showTargetAnchor;
        guideGroundLayer.checked = state.showGroundLine;
        guideAnchorDeltaLayer.checked = state.showAnchorDelta;
      }

      function cutSpan() {
        const start = Math.round(Math.max(0, Number(state.offsetX || 0)));
        return {
          start,
          end: Math.max(start + 1, Math.round(state.width)),
          top: Math.round(Math.max(0, Number(state.offsetY || 0))),
          bottom: Math.max(Math.round(Math.max(0, Number(state.offsetY || 0))) + 1, Math.round(state.height)),
        };
      }

      function normalizedCutPositions(axis = "x") {
        const values = axis === "y" ? state.cutPositionsY : state.cutPositionsX;
        return values
          .map((value) => Math.round(Number(value)))
          .filter((value) => Number.isFinite(value));
      }

      function normalizedIncomingCutPositions(values) {
        return Array.isArray(values)
          ? values
              .map((value) => Math.round(Number(value)))
              .filter((value) => Number.isFinite(value))
          : [];
      }

      function sameCutPositions(left, right) {
        return left.length === right.length
          && left.every((value, index) => value === right[index]);
      }

      function positionCutBoundary(line, axis, position, span = cutSpan()) {
        if (axis === "y") {
          line.style.top = `${Math.round(position * state.zoom)}px`;
          line.style.left = `${Math.round(span.start * state.zoom)}px`;
          line.style.width = `${Math.max(1, Math.round((span.end - span.start) * state.zoom))}px`;
        } else {
          line.style.left = `${Math.round(position * state.zoom)}px`;
          line.style.top = `${Math.round(span.top * state.zoom)}px`;
          line.style.height = `${Math.max(1, Math.round((span.bottom - span.top) * state.zoom))}px`;
        }
      }

      function clampedCutPosition(axis, index, nextPosition) {
        const positions = normalizedCutPositions(axis);
        const span = cutSpan();
        const start = axis === "y" ? span.top : span.start;
        const end = axis === "y" ? span.bottom : span.end;
        const min = index === 0 ? start + 1 : positions[index - 1] + 1;
        const max = index === positions.length - 1 ? end - 1 : positions[index + 1] - 1;
        return Math.max(min, Math.min(max, Math.round(nextPosition)));
      }

      function removeCutGhost() {
        state.cutGhostElement?.remove();
        state.cutGhostElement = null;
      }

      function updateCutGhostPosition(axis, index, nextPosition) {
        const clamped = clampedCutPosition(axis, index, nextPosition);
        state.cutGhostPosition = clamped;
        if (!state.cutGhostElement) {
          const ghost = document.createElement("div");
          ghost.className = `cut-boundary ghost${axis === "y" ? " horizontal" : ""}`;
          ghost.dataset.index = String(index);
          ghost.dataset.axis = axis;
          ghost.setAttribute("aria-hidden", "true");
          const label = document.createElement("span");
          label.className = "cut-ghost-label";
          ghost.appendChild(label);
          cutGuides.appendChild(ghost);
          state.cutGhostElement = ghost;
        }
        positionCutBoundary(state.cutGhostElement, axis, clamped);
        const label = state.cutGhostElement.querySelector(".cut-ghost-label");
        if (label) {
          label.textContent = `${axis.toUpperCase()} ${clamped}px`;
        }
        return clamped;
      }

      function updateCutGuidesGeometry(force = false) {
        const signature = JSON.stringify([
          state.zoom,
          state.offsetX,
          state.offsetY,
          state.width,
          state.height,
          state.allowCutDrag,
          normalizedCutPositions("x"),
          normalizedCutPositions("y"),
          state.cutDraggingIndex,
          state.cutDraggingAxis,
        ]);
        if (!force && signature === cutGuidesSignature) {
          return;
        }
        cutGuidesSignature = signature;
        cutGuides.replaceChildren();
        state.cutGhostElement = null;
        const span = cutSpan();
        const renderBoundary = (axis, position, index) => {
          const line = document.createElement("div");
          line.className = `cut-boundary${axis === "y" ? " horizontal" : ""}`;
          line.classList.toggle(
            "active",
            state.cutDraggingIndex === index && state.cutDraggingAxis === axis,
          );
          line.dataset.index = String(index);
          line.dataset.axis = axis;
          positionCutBoundary(line, axis, position, span);
          const handle = document.createElement("div");
          handle.className = "cut-handle";
          handle.dataset.index = String(index);
          handle.dataset.axis = axis;
          if (!state.allowCutDrag) {
            handle.style.pointerEvents = "none";
            handle.style.cursor = "default";
          } else {
            handle.addEventListener("pointerdown", (event) => {
              event.preventDefault();
              event.stopPropagation();
              state.cutDraggingIndex = index;
              state.cutDraggingAxis = axis;
              state.cutActivePointerId = event.pointerId;
              state.cutDragOriginPosition = position;
              state.cutGhostPosition = position;
              handle.setPointerCapture?.(event.pointerId);
              handle.classList.add("dragging");
              line.classList.add("active");
              updateCutGhostPosition(axis, index, position);
            });
          }
          line.appendChild(handle);
          cutGuides.appendChild(line);
        };
        normalizedCutPositions("x").forEach((position, index) => renderBoundary("x", position, index));
        normalizedCutPositions("y").forEach((position, index) => renderBoundary("y", position, index));
        if (
          state.cutDraggingIndex >= 0
          && Number.isFinite(state.cutGhostPosition)
        ) {
          updateCutGhostPosition(
            state.cutDraggingAxis,
            state.cutDraggingIndex,
            state.cutGhostPosition,
          );
        }
      }

      function commitCutPosition(axis, index, nextPosition) {
        const positions = normalizedCutPositions(axis);
        const clamped = clampedCutPosition(axis, index, nextPosition);
        positions[index] = clamped;
        if (axis === "y") {
          state.cutPositionsY = positions;
        } else {
          state.cutPositionsX = positions;
          state.cutPositions = positions;
        }
        return positions;
      }

      function emitCutState(event, action, positions) {
        emitValue({
          eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          type: "cut",
          action,
          cutIndex: state.cutDraggingIndex,
          cutAxis: state.cutDraggingAxis,
          cutPositions: positions.map((value) => Math.round(value)),
          cutPositionsX: normalizedCutPositions("x").map((value) => Math.round(value)),
          cutPositionsY: normalizedCutPositions("y").map((value) => Math.round(value)),
          allowCutDrag: state.allowCutDrag,
          ...modifiers(event),
        });
      }

      function endCutDrag(event, commit = true) {
        if (state.cutDraggingIndex < 0) {
          return;
        }
        const axis = state.cutDraggingAxis;
        const index = state.cutDraggingIndex;
        if (commit && Number.isFinite(state.cutGhostPosition)) {
          const positionsForAxis = commitCutPosition(
            axis,
            index,
            state.cutGhostPosition,
          );
          state.cutCommitPending = {
            x: normalizedCutPositions("x"),
            y: normalizedCutPositions("y"),
            createdAt: Date.now(),
          };
          emitCutState(event, "end", positionsForAxis);
        }
        removeCutGhost();
        state.cutDraggingIndex = -1;
        state.cutActivePointerId = null;
        state.cutDragOriginPosition = null;
        state.cutGhostPosition = null;
        updateCutGuidesGeometry(true);
      }

      function focusViewportOnOverlay() {
        if (state.mode !== "segmentation-center") {
          return;
        }
        const overlayWidth = Math.max(1, Math.round((state.overlay?.width || state.width) * state.zoom));
        const overlayHeight = Math.max(1, Math.round((state.overlay?.height || state.height) * state.zoom));
        const targetLeft = Math.max(
          0,
          Math.round(state.offsetX * state.zoom + overlayWidth / 2 - stage.clientWidth / 2),
        );
        const targetTop = Math.max(
          0,
          Math.round(state.offsetY * state.zoom + overlayHeight / 2 - stage.clientHeight / 2),
        );
        stage.scrollLeft = targetLeft;
        stage.scrollTop = targetTop;
      }

      function scheduleViewportFocus() {
        requestAnimationFrame(focusViewportOnOverlay);
      }

      function setZoom(value, announce = false) {
        const next = Math.max(1, Math.min(40, Math.round(value)));
        const changed = state.zoom !== next;
        state.zoom = next;
        canvas.style.width = `${state.width * next}px`;
        canvas.style.height = `${state.height * next}px`;
        setPillValue(zoomPill, `${next}×`);
        const centerPill = document.getElementById("zoom-pill-center");
        if (centerPill) {
          setPillValue(centerPill, `${next}×`);
        }
        if (announce) {
          emitValue({
            eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
            type: "toolbar",
            action: "zoom",
            zoom: next,
          });
        }
        scheduleCursorUpdate();
        requestAnimationFrame(updateGuidesGeometry);
        if (changed || !cutGuides.childElementCount) {
          requestAnimationFrame(updateCutGuidesGeometry);
        }
      }

      function computeFitZoom() {
        const viewportWidth = Math.max(1, stage.clientWidth - 36);
        const viewportHeight = Math.max(1, stage.clientHeight - 36);
        const zoomX = viewportWidth / state.width;
        const zoomY = viewportHeight / state.height;
        return Math.max(1, Math.min(40, Math.floor(Math.min(zoomX, zoomY))));
      }

      function updateSample(sample) {
        if (!sample) {
          state.sample = null;
          sampleText.textContent = "Sin muestra";
          swatch.style.background = "transparent";
          return;
        }
        state.sample = sample;
        const [r, g, b, a] = sample;
        sampleText.textContent = `#${[r, g, b].map((n) => n.toString(16).padStart(2, "0")).join("").toUpperCase()} · A ${a}`;
        swatch.style.background = `rgb(${r}, ${g}, ${b})`;
      }

      function updatePendingEdits() {
        const count = state.pendingEdits.length;
        pendingEdits.textContent = count ? `Guardar ${count}` : "Guardar";
        commitEditsButton.classList.toggle("active", count > 0);
        commitEditsButton.dataset.pending = String(count);
        commitEditsButton.disabled = count === 0;
        updateHistoryControls();
      }

      function normalizeStudioLayers(value) {
        const source = Array.isArray(value)
          ? value
          : Array.isArray(value?.layers)
            ? value.layers
            : [];
        return source.map((entry, index) => {
          const layer = entry && typeof entry === "object" ? entry : {};
          return {
            id: String(layer.id ?? layer.layerId ?? layer.key ?? index),
            name: String(layer.name ?? layer.label ?? `Capa ${index + 1}`),
            visible: layer.visible !== false,
            locked: layer.locked === true,
            frames: layer.frames ?? layer.cels ?? layer.cells ?? null,
          };
        });
      }

      function studioLayerFrameCount(layer) {
        if (Array.isArray(layer.frames)) {
          return layer.frames.length;
        }
        if (layer.frames && typeof layer.frames === "object") {
          return Object.keys(layer.frames)
            .map((key) => Number(key))
            .filter((key) => Number.isFinite(key) && key >= 0)
            .reduce((maximum, key) => Math.max(maximum, key + 1), 0);
        }
        return 0;
      }

      function studioLayerHasCel(layer, frameIndex) {
        if (Array.isArray(layer.frames)) {
          const cel = layer.frames[frameIndex];
          return cel !== undefined && cel !== null && cel !== false;
        }
        if (layer.frames && typeof layer.frames === "object") {
          const cel = layer.frames[frameIndex] ?? layer.frames[String(frameIndex)];
          return cel !== undefined && cel !== null && cel !== false;
        }
        return false;
      }

      function emitStudio(action, payload) {
        emitValue({
          eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          type: "studio",
          action,
          ...payload,
        });
      }

      function selectStudioLayer(layerId) {
        if (!layerId || state.activeLayerId === layerId) {
          return;
        }
        state.activeLayerId = layerId;
        switchPendingEditContext(editContextKey());
        state.studioSelectionPending = {
          layerId,
          frameIndex: state.activeFrame,
          frameSpecific: false,
          createdAt: Date.now(),
        };
        renderStudioTimeline(true);
        emitStudio("select-layer", { layerId });
      }

      function selectStudioCel(layerId, frameIndex, event = null) {
        if (!layerId || (state.activeLayerId === layerId && state.activeFrame === frameIndex)) {
          return;
        }
        const previousFrame = state.activeFrame;
        state.activeLayerId = layerId;
        state.activeFrame = frameIndex;
        switchPendingEditContext(editContextKey());
        state.studioSelectionPending = {
          layerId,
          frameIndex,
          frameSpecific: true,
          createdAt: Date.now(),
        };
        if (event?.shiftKey) {
          const rangeStart = Number.isFinite(previousFrame) ? previousFrame : frameIndex;
          const start = Math.min(rangeStart, frameIndex);
          const end = Math.max(rangeStart, frameIndex);
          state.selectedFrames = Array.from({ length: end - start + 1 }, (_, index) => start + index);
          emitStudio("select-range", { layerId, frameIndex, rangeStart });
        } else {
          state.selectedFrames = [frameIndex];
          emitStudio("select-cel", { layerId, frameIndex });
        }
        renderStudioTimeline(true);
      }

      function clearStudioDragState() {
        studioDragLayerId = "";
        timelineRows.querySelectorAll(".timeline-row.dragging, .timeline-row.drop-target")
          .forEach((row) => row.classList.remove("dragging", "drop-target"));
      }

      function renderStudioTimeline(force = false) {
        const hasLayerTimeline = state.mode === "layer-edit" && state.studioLayers.length > 0;
        const signature = JSON.stringify([
          state.mode,
          state.activeLayerId,
          state.activeFrame,
          state.frameCount,
          state.selectedFrames,
          state.studioLayers,
        ]);
        if (!force && signature === studioTimelineSignature) {
          return;
        }
        studioTimelineSignature = signature;
        studioTimeline.hidden = !hasLayerTimeline;
        if (!hasLayerTimeline) {
          timelineSummary.textContent = "";
          timelineRows.replaceChildren();
          return;
        }

        const inferredFrameCount = state.studioLayers.reduce(
          (maximum, layer) => Math.max(maximum, studioLayerFrameCount(layer)),
          0,
        );
        const frameCount = Math.max(1, state.frameCount, inferredFrameCount, state.activeFrame + 1);
        const visibleFrameCount = Math.min(frameCount, 48);
        timelineSummary.textContent = `Frame ${state.activeFrame + 1} / ${frameCount}`;
        timelineRows.replaceChildren();

        state.studioLayers.forEach((layer) => {
          const row = document.createElement("div");
          row.className = "timeline-row";
          row.dataset.layerId = layer.id;
          row.draggable = state.studioLayers.length > 1;
          row.setAttribute("aria-roledescription", "fila de capa reordenable");
          row.setAttribute("aria-label", `Capa ${layer.name}. Arrastra para reordenar.`);
          row.classList.toggle("active", layer.id === state.activeLayerId);

          row.addEventListener("dragstart", (event) => {
            if (event.target instanceof Element && event.target.closest(".timeline-cel")) {
              event.preventDefault();
              return;
            }
            studioDragLayerId = layer.id;
            row.classList.add("dragging");
            event.dataTransfer?.setData("text/plain", layer.id);
            if (event.dataTransfer) {
              event.dataTransfer.effectAllowed = "move";
            }
          });
          row.addEventListener("dragover", (event) => {
            if (!studioDragLayerId || studioDragLayerId === layer.id) {
              return;
            }
            event.preventDefault();
            if (event.dataTransfer) {
              event.dataTransfer.dropEffect = "move";
            }
            row.classList.add("drop-target");
          });
          row.addEventListener("dragleave", (event) => {
            if (!(event.relatedTarget instanceof Node) || !row.contains(event.relatedTarget)) {
              row.classList.remove("drop-target");
            }
          });
          row.addEventListener("drop", (event) => {
            event.preventDefault();
            const sourceLayerId = studioDragLayerId || event.dataTransfer?.getData("text/plain") || "";
            const targetLayerId = layer.id;
            clearStudioDragState();
            if (!sourceLayerId || sourceLayerId === targetLayerId) {
              return;
            }
            suppressStudioClick = true;
            window.setTimeout(() => {
              suppressStudioClick = false;
            }, 0);
            const sourceIndex = state.studioLayers.findIndex((entry) => entry.id === sourceLayerId);
            const targetIndex = state.studioLayers.findIndex((entry) => entry.id === targetLayerId);
            if (sourceIndex >= 0 && targetIndex >= 0) {
              const reordered = state.studioLayers.slice();
              const [moved] = reordered.splice(sourceIndex, 1);
              reordered.splice(targetIndex, 0, moved);
              state.studioLayers = reordered;
              state.studioOrderPending = {
                layerIds: reordered.map((entry) => entry.id),
                createdAt: Date.now(),
              };
              renderStudioTimeline(true);
            }
            emitStudio("reorder-layer", { layerId: sourceLayerId, targetLayerId });
          });
          row.addEventListener("dragend", clearStudioDragState);

          const name = document.createElement("button");
          name.type = "button";
          name.className = "timeline-layer-name";
          name.title = `${layer.name}${layer.locked ? " · bloqueada" : ""}`;
          name.setAttribute("aria-pressed", String(layer.id === state.activeLayerId));
          name.setAttribute("aria-label", `Seleccionar capa ${layer.name}`);
          name.textContent = `${layer.visible ? "●" : "○"} ${layer.name}${layer.locked ? " · 🔒" : ""}`;
          name.addEventListener("click", () => {
            if (suppressStudioClick) {
              suppressStudioClick = false;
              return;
            }
            selectStudioLayer(layer.id);
          });
          row.appendChild(name);

          const cels = document.createElement("div");
          cels.className = "timeline-cels";
          for (let frameIndex = 0; frameIndex < visibleFrameCount; frameIndex += 1) {
            const cel = document.createElement("button");
            cel.type = "button";
            cel.className = "timeline-cel";
            const hasCel = studioLayerHasCel(layer, frameIndex);
            cel.classList.toggle("has-cel", hasCel);
            cel.classList.toggle("current", frameIndex === state.activeFrame);
            cel.classList.toggle("selected", state.selectedFrames.includes(frameIndex));
            cel.title = `Frame ${frameIndex + 1}${hasCel ? " · cel" : " · vacío"}`;
            cel.setAttribute(
              "aria-label",
              `Seleccionar frame ${frameIndex + 1} de la capa ${layer.name}${hasCel ? " con cel" : " vacío"}`,
            );
            cel.setAttribute(
              "aria-pressed",
              String(layer.id === state.activeLayerId && frameIndex === state.activeFrame),
            );
            cel.addEventListener("click", (event) => {
              if (suppressStudioClick) {
                suppressStudioClick = false;
                return;
              }
              selectStudioCel(layer.id, frameIndex, event);
            });
            cels.appendChild(cel);
          }
          row.appendChild(cels);
          timelineRows.appendChild(row);
        });
      }

      function setPillValue(pill, value) {
        const valueElement = pill.querySelector("span:last-child");
        if (valueElement) {
          valueElement.textContent = value;
          return;
        }
        pill.textContent = value;
      }

      function draw() {
        canvas.width = state.width;
        canvas.height = state.height;
        context.imageSmoothingEnabled = false;
        context.clearRect(0, 0, state.width, state.height);
        if (state.playbackTimer && state.animationFrames.length) {
          const playbackFrame = state.animationFrames[state.playbackIndex % state.animationFrames.length];
          if (playbackFrame) {
            context.drawImage(playbackFrame, 0, 0);
          }
          return;
        }
        const localLayerMove = (
          state.mode === "layer-edit"
          && state.tool === "move"
          && state.moveBase
          && !state.floatingSelection
        );
        const baseImage = localLayerMove ? state.moveBase : state.image;
        if (baseImage) {
          context.drawImage(baseImage, 0, 0);
        }
        if (state.overlay && (state.mode !== "layer-edit" || localLayerMove)) {
          context.drawImage(state.overlay, state.offsetX, state.offsetY);
        }
        drawPendingEdits();
        drawFloatingSelection();
        drawCropPreview();
        updateGuidesGeometry();
      }

      function drawFloatingSelection() {
        if (!state.floatingSelection) {
          return;
        }
        context.save();
        context.imageSmoothingEnabled = false;
        context.drawImage(
          state.floatingSelection,
          state.floatingSelectionX,
          state.floatingSelectionY,
        );
        if (state.floatingHighlight) {
          context.drawImage(
            state.floatingHighlight,
            state.floatingSelectionX,
            state.floatingSelectionY,
          );
        }
        const bounds = state.floatingSelectionBounds;
        if (Array.isArray(bounds) && bounds.length === 4) {
          const [x0, y0, x1, y1] = bounds;
          context.strokeStyle = "rgba(255, 232, 168, 0.98)";
          context.lineWidth = 1;
          context.setLineDash([2, 2]);
          context.strokeRect(
            state.floatingSelectionX + x0 + 0.5,
            state.floatingSelectionY + y0 + 0.5,
            Math.max(1, x1 - x0),
            Math.max(1, y1 - y0),
          );
        }
        context.restore();
      }

      function drawCropPreview() {
        if (state.mode !== "layer-edit" || !isShapeTool(state.tool) || !state.cropStart) {
          return;
        }
        const points = state.cropPath.length ? state.cropPath : [state.cropStart];
        const current = points[points.length - 1] || state.cropStart;
        context.save();
        context.imageSmoothingEnabled = false;
        context.strokeStyle = "rgba(255, 196, 91, 0.95)";
        context.fillStyle = "rgba(255, 196, 91, 0.18)";
        context.lineWidth = 1;
        context.setLineDash([2, 2]);
        context.beginPath();
        if (state.tool === "crop_lasso" || state.tool === "select_lasso") {
          context.moveTo(state.cropStart.x + 0.5, state.cropStart.y + 0.5);
          for (const point of points.slice(1)) {
            context.lineTo(point.x + 0.5, point.y + 0.5);
          }
          if (points.length > 2) {
            context.closePath();
            context.fill();
          }
          context.stroke();
        } else {
          const x = Math.min(state.cropStart.x, current.x);
          const y = Math.min(state.cropStart.y, current.y);
          const width = Math.abs(current.x - state.cropStart.x) + 1;
          const height = Math.abs(current.y - state.cropStart.y) + 1;
          if (state.tool === "crop_ellipse" || state.tool === "select_ellipse") {
            context.ellipse(
              x + width / 2,
              y + height / 2,
              Math.max(0.5, width / 2),
              Math.max(0.5, height / 2),
              0,
              0,
              Math.PI * 2,
            );
            context.fill();
            context.stroke();
          } else {
            context.rect(x + 0.5, y + 0.5, Math.max(1, width), Math.max(1, height));
            context.fill();
            context.stroke();
          }
        }
        context.restore();
      }

      function redraw() {
        if (drawFrameId) {
          cancelAnimationFrame(drawFrameId);
          drawFrameId = 0;
        }
        updateModeUI();
        renderStudioTimeline();
        setZoom(state.zoom);
        setActiveTool(state.tool, false);
        setBrushRadius(state.brushRadius);
        setGuideOpacity(state.guideOpacity);
        updateSample(state.sample);
        updatePendingEdits();
        draw();
        requestAnimationFrame(setFrameHeight);
        requestAnimationFrame(updateCursor);
        requestAnimationFrame(updateCutGuidesGeometry);
      }

      function pointerToPixel(event) {
        const rect = canvas.getBoundingClientRect();
        const x = Math.min(
          state.width - 1,
          Math.max(0, Math.floor(((event.clientX - rect.left) / rect.width) * state.width)),
        );
        const y = Math.min(
          state.height - 1,
          Math.max(0, Math.floor(((event.clientY - rect.top) / rect.height) * state.height)),
        );
        return { x, y };
      }

      function modifiers(event) {
        return {
          shiftKey: !!event.shiftKey,
          altKey: !!event.altKey,
          metaKey: !!event.metaKey,
          ctrlKey: !!event.ctrlKey,
        };
      }

      function focusCanvas() {
        canvas.focus();
      }

      function emitPointer(event, type) {
        const point = pointerToPixel(event);
        state.pointerPixelX = point.x;
        state.pointerPixelY = point.y;
        state.pointerVisible = true;
        updateCursor();
        emitValue({
          eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          type,
          tool: state.tool,
          button: event.button,
          x: point.x,
          y: point.y,
          brushRadius: state.brushRadius,
          dragging: type === "pointermove",
          ...modifiers(event),
        });
      }

      function emitDrag(event, action, point) {
        if (action === "end") {
          state.transformCommitPending = {
            offsetX: state.offsetX,
            offsetY: state.offsetY,
            mode: state.mode,
            imageUrl: state.imageUrl,
            overlayUrl: state.overlayUrl,
            frameToken: state.frameToken,
            createdAt: Date.now(),
          };
        }
        emitValue({
          eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          type: "transform",
          action,
          mode: state.mode,
          tool: "move",
          x: point.x,
          y: point.y,
          pointerX: point.x,
          pointerY: point.y,
          startX: state.dragStartX,
          startY: state.dragStartY,
          offsetX: state.offsetX,
          offsetY: state.offsetY,
          deltaX: state.offsetX - state.dragOriginX,
          deltaY: state.offsetY - state.dragOriginY,
          dragging: action !== "end",
          ...modifiers(event),
        });
      }

      function emitFloatingTransform(event, point) {
        state.floatingTransformPending = {
          x: state.floatingSelectionX,
          y: state.floatingSelectionY,
          selectionUrl: state.floatingSelectionUrl,
          createdAt: Date.now(),
        };
        emitValue({
          eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          type: "floating-transform",
          action: "end",
          mode: state.mode,
          tool: "move",
          x: point.x,
          y: point.y,
          deltaX: state.floatingSelectionX - state.floatingSelectionStartX,
          deltaY: state.floatingSelectionY - state.floatingSelectionStartY,
          ...modifiers(event),
        });
      }

      function pointHitsOverlay(point) {
        if (state.mode !== "segmentation-center" || !state.allowDrag) {
          return false;
        }
        const overlayWidth = state.overlay?.width || state.width;
        const overlayHeight = state.overlay?.height || state.height;
        return (
          point.x >= state.offsetX
          && point.x < state.offsetX + overlayWidth
          && point.y >= state.offsetY
          && point.y < state.offsetY + overlayHeight
        );
      }

      function emitStroke(event) {
        if (!state.strokePath.length) {
          return;
        }
        state.pendingEdits.push({
          tool: state.tool,
          path: state.strokePath.map((point) => [point.x, point.y]),
          brushRadius: state.brushRadius,
          color: state.paintColor,
        });
        state.pendingRedoEdits = [];
        updatePendingEdits();
      }

      function cropShapeForTool(tool) {
        if (tool === "crop_rect" || tool === "select_rect") {
          return "rect";
        }
        if (tool === "crop_ellipse" || tool === "select_ellipse") {
          return "ellipse";
        }
        return "lasso";
      }

      function emitCrop(event, point) {
        if (!state.cropStart) {
          return;
        }
        const path = state.tool === "crop_lasso" || state.tool === "select_lasso"
          ? state.cropPath.map((entry) => [entry.x, entry.y])
          : [];
        const payload = {
          eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          type: isSelectionTool(state.tool) ? "selection" : "crop",
          tool: state.tool,
          shape: cropShapeForTool(state.tool),
          start: [state.cropStart.x, state.cropStart.y],
          end: [point.x, point.y],
          startX: state.cropStart.x,
          startY: state.cropStart.y,
          endX: point.x,
          endY: point.y,
          path,
          ...modifiers(event),
        };
        emitValue(payload);
      }

      function renderStrokeSegment(from, to, edit = null) {
        const tool = edit?.tool || state.tool;
        const brushRadius = Math.max(1, Number(edit?.brushRadius || state.brushRadius));
        const radius = Math.max(0, brushRadius - 1);
        context.save();
        context.imageSmoothingEnabled = false;
        context.globalCompositeOperation = tool === "eraser" ? "destination-out" : "source-over";
        const [r, g, b, a = 255] = Array.isArray(edit?.color) ? edit.color : state.paintColor;
        context.strokeStyle = `rgba(${r}, ${g}, ${b}, ${a / 255})`;
        context.fillStyle = context.strokeStyle;
        context.lineWidth = radius * 2 + 1;
        context.lineCap = "round";
        context.lineJoin = "round";
        context.beginPath();
        context.moveTo(from.x + 0.5, from.y + 0.5);
        context.lineTo(to.x + 0.5, to.y + 0.5);
        context.stroke();
        if (from.x === to.x && from.y === to.y) {
          context.beginPath();
          context.arc(from.x + 0.5, from.y + 0.5, Math.max(0.5, radius + 0.5), 0, Math.PI * 2);
          context.fill();
        }
        context.restore();
      }

      function previewStroke(from, to) {
        renderStrokeSegment(from, to);
      }

      function drawPendingEdits() {
        const committed = state.committedEditsPending?.edits || [];
        for (const edit of [...committed, ...state.pendingEdits]) {
          const path = Array.isArray(edit?.path)
            ? edit.path
                .filter((point) => Array.isArray(point) && point.length === 2)
                .map((point) => ({ x: Number(point[0]), y: Number(point[1]) }))
            : [];
          if (!path.length) {
            continue;
          }
          renderStrokeSegment(path[0], path[0], edit);
          for (let index = 1; index < path.length; index += 1) {
            renderStrokeSegment(path[index - 1], path[index], edit);
          }
        }
      }

      function sampleCanvas(point) {
        const sampled = Array.from(context.getImageData(point.x, point.y, 1, 1).data);
        state.paintColor = sampled;
        updateSample(sampled);
      }

      function commitPendingEdits() {
        if (!state.pendingEdits.length) {
          return;
        }
        const edits = state.pendingEdits;
        emitValue({
          eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          type: "edit-batch",
          edits,
          sample: state.paintColor,
        });
        state.committedEditsPending = {
          edits,
          imageUrl: state.imageUrl,
          createdAt: Date.now(),
        };
        state.pendingEdits = [];
        state.pendingRedoEdits = [];
        updatePendingEdits();
      }

      canvas.addEventListener("contextmenu", (event) => {
        event.preventDefault();
      });

      canvas.addEventListener("pointerenter", (event) => {
        state.pointerVisible = true;
        const point = pointerToPixel(event);
        state.pointerPixelX = point.x;
        state.pointerPixelY = point.y;
        updateCursor();
      });

      canvas.addEventListener("pointerdown", (event) => {
        focusCanvas();
        if (state.mode === "segmentation-cut") {
          event.preventDefault();
          return;
        }
        state.dragging = event.button === 0 || (event.buttons & 1) === 1;
        if (canvas.setPointerCapture) {
          try {
            canvas.setPointerCapture(event.pointerId);
          } catch (error) {
            console.warn("pointer capture failed", error);
          }
