        const point = pointerToPixel(event);
        state.pointerPixelX = point.x;
        state.pointerPixelY = point.y;
        state.pointerVisible = true;
        updateCursor();
        if (state.mode === "segmentation-center" && state.allowDrag && pointHitsOverlay(point)) {
          state.dragStartX = point.x;
          state.dragStartY = point.y;
          state.dragOriginX = state.offsetX;
          state.dragOriginY = state.offsetY;
          event.preventDefault();
          return;
        }
        if (state.mode === "layer-edit" && state.tool === "move") {
          state.dragStartX = point.x;
          state.dragStartY = point.y;
          state.dragOriginX = state.floatingSelection ? state.floatingSelectionX : state.offsetX;
          state.dragOriginY = state.floatingSelection ? state.floatingSelectionY : state.offsetY;
          event.preventDefault();
          return;
        }
        if (state.mode === "layer-edit" && isShapeTool(state.tool)) {
          state.cropStart = point;
          state.cropPath = [point];
          draw();
          updateCursor();
          event.preventDefault();
          return;
        }
        if (state.mode === "segmentation-center") {
          event.preventDefault();
          return;
        }
        if (state.tool === "eraser" || (state.mode === "layer-edit" && state.tool === "pencil")) {
          const lineStart = event.shiftKey && state.lastStrokePoint
            ? state.lastStrokePoint
            : point;
          state.strokePath = lineStart.x === point.x && lineStart.y === point.y
            ? [point]
            : [lineStart, point];
          previewStroke(lineStart, point);
          updateCursor();
          event.preventDefault();
          return;
        }
        if (state.tool === "eyedropper") {
          sampleCanvas(point);
          event.preventDefault();
          return;
        }
        emitPointer(event, "pointerdown");
        event.preventDefault();
      });

      canvas.addEventListener("pointermove", (event) => {
        state.pointerVisible = true;
        const point = pointerToPixel(event);
        if (state.mode === "segmentation-cut") {
          state.pointerPixelX = point.x;
          state.pointerPixelY = point.y;
          scheduleCursorUpdate();
          event.preventDefault();
          return;
        }
        if (state.mode === "segmentation-center" && state.allowDrag && state.dragging && (event.buttons & 1)) {
          const nextX = state.dragOriginX + (point.x - state.dragStartX);
          const nextY = state.dragOriginY + (point.y - state.dragStartY);
          state.pointerPixelX = point.x;
          state.pointerPixelY = point.y;
          setObjectOffset(nextX, nextY);
          scheduleCursorUpdate();
        } else if (state.mode === "layer-edit" && state.tool === "move" && state.dragging && (event.buttons & 1)) {
          const nextX = state.dragOriginX + (point.x - state.dragStartX);
          const nextY = state.dragOriginY + (point.y - state.dragStartY);
          state.pointerPixelX = point.x;
          state.pointerPixelY = point.y;
          if (state.floatingSelection) {
            state.floatingSelectionX = nextX;
            state.floatingSelectionY = nextY;
            scheduleDraw();
          } else {
            setObjectOffset(nextX, nextY);
          }
          scheduleCursorUpdate();
        } else if (state.mode === "layer-edit" && isShapeTool(state.tool) && state.dragging && (event.buttons & 1)) {
          state.pointerPixelX = point.x;
          state.pointerPixelY = point.y;
          const last = state.cropPath[state.cropPath.length - 1];
          if (!last || last.x !== point.x || last.y !== point.y) {
            state.cropPath.push(point);
            scheduleDraw();
          }
          scheduleCursorUpdate();
        } else if (state.mode === "segmentation-center") {
          state.pointerPixelX = point.x;
          state.pointerPixelY = point.y;
          scheduleCursorUpdate();
        } else if (
          state.dragging
          && (state.tool === "eraser" || (state.mode === "layer-edit" && state.tool === "pencil"))
          && (event.buttons & 1)
        ) {
          const last = state.strokePath[state.strokePath.length - 1];
          state.pointerPixelX = point.x;
          state.pointerPixelY = point.y;
          if (!last || last.x !== point.x || last.y !== point.y) {
            state.strokePath.push(point);
            previewStroke(last || point, point);
          }
          scheduleCursorUpdate();
        } else {
          state.pointerPixelX = point.x;
          state.pointerPixelY = point.y;
          scheduleCursorUpdate();
        }
        event.preventDefault();
      });

      canvas.addEventListener("pointerup", (event) => {
        const point = pointerToPixel(event);
        state.pointerPixelX = point.x;
        state.pointerPixelY = point.y;
        if (state.mode === "segmentation-cut") {
          event.preventDefault();
          return;
        }
        if (state.tool === "eraser" || (state.mode === "layer-edit" && state.tool === "pencil")) {
          const last = state.strokePath[state.strokePath.length - 1];
          if (!last || last.x !== point.x || last.y !== point.y) {
            state.strokePath.push(point);
            previewStroke(last || point, point);
          }
          emitStroke(event);
          state.lastStrokePoint = point;
          state.strokePath = [];
        } else if (state.mode === "segmentation-center" && state.allowDrag) {
          emitDrag(event, "end", point);
        } else if (state.mode === "layer-edit" && state.tool === "move") {
          if (state.floatingSelection) {
            emitFloatingTransform(event, point);
          } else {
            emitDrag(event, "end", point);
          }
        } else if (state.mode === "layer-edit" && isShapeTool(state.tool)) {
          const last = state.cropPath[state.cropPath.length - 1];
          if (!last || last.x !== point.x || last.y !== point.y) {
            state.cropPath.push(point);
          }
          emitCrop(event, point);
          state.cropStart = null;
          state.cropPath = [];
          draw();
        }
        state.dragging = false;
        state.pointerVisible = true;
        updateCursor();
        event.preventDefault();
      });

      canvas.addEventListener("pointercancel", () => {
        const point = { x: state.pointerPixelX, y: state.pointerPixelY };
        const cancelObjectMove = (
          (state.mode === "segmentation-center" && state.allowDrag && state.dragging)
          || (state.mode === "layer-edit" && state.tool === "move" && state.dragging && !state.floatingSelection)
        );
        if (cancelObjectMove) {
          state.offsetX = state.dragOriginX;
          state.offsetY = state.dragOriginY;
          state.transformCommitPending = null;
          emitDrag({ button: 0, shiftKey: false, altKey: false, metaKey: false, ctrlKey: false }, "cancel", point);
        }
        state.dragging = false;
        state.strokePath = [];
        state.cropStart = null;
        state.cropPath = [];
        if (state.floatingSelection) {
          state.floatingSelectionX = state.floatingSelectionStartX;
          state.floatingSelectionY = state.floatingSelectionStartY;
        }
        state.pointerVisible = false;
        draw();
        updateCursor();
      });

      document.addEventListener("pointermove", (event) => {
        if (state.mode !== "segmentation-cut" || !state.allowCutDrag || state.cutDraggingIndex < 0) {
          return;
        }
        if (state.cutActivePointerId !== null && event.pointerId !== state.cutActivePointerId) {
          return;
        }
        const pointer = pointerToPixel(event);
        updateCutGhostPosition(
          state.cutDraggingAxis,
          state.cutDraggingIndex,
          state.cutDraggingAxis === "y" ? pointer.y : pointer.x,
        );
        event.preventDefault();
      });

      document.addEventListener("pointerup", (event) => {
        if (state.mode !== "segmentation-cut" || state.cutDraggingIndex < 0) {
          return;
        }
        if (state.cutActivePointerId !== null && event.pointerId !== state.cutActivePointerId) {
          return;
        }
        endCutDrag(event, true);
      });

      document.addEventListener("pointercancel", (event) => {
        if (state.mode !== "segmentation-cut" || state.cutDraggingIndex < 0) {
          return;
        }
        if (state.cutActivePointerId !== null && event.pointerId !== state.cutActivePointerId) {
          return;
        }
        endCutDrag(event, false);
      });

      canvas.addEventListener("pointerleave", () => {
        if (!state.dragging) {
          state.strokePath = [];
          if (state.mode === "layer-edit" && isShapeTool(state.tool)) {
            state.cropStart = null;
            state.cropPath = [];
            draw();
          }
          state.pointerVisible = false;
          updateCursor();
        }
      });

      canvas.addEventListener("wheel", (event) => {
        if (!event.ctrlKey) {
          return;
        }
        event.preventDefault();
        const delta = event.deltaY < 0 ? 1 : -1;
        setZoom(state.zoom + delta, false);
      }, { passive: false });

      canvas.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();
        if ((event.metaKey || event.ctrlKey) && key === "z") {
          emitHistory(event.shiftKey ? "redo" : "undo");
          event.preventDefault();
          return;
        }
        if ((event.metaKey || event.ctrlKey) && key === "y") {
          emitHistory("redo");
          event.preventDefault();
          return;
        }
        if (state.mode === "layer-edit" && (event.metaKey || event.ctrlKey) && key === "a") {
          emitValue({
            eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
            type: "selection-command",
            action: "select-all",
          });
          event.preventDefault();
          return;
        }
        if (state.mode === "layer-edit" && (event.metaKey || event.ctrlKey) && key === "d") {
          emitValue({
            eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
            type: "selection-command",
            action: "deselect",
          });
          event.preventDefault();
          return;
        }
        if (state.mode === "layer-edit" && (event.metaKey || event.ctrlKey) && ["c", "x", "v"].includes(key)) {
          emitValue({
            eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
            type: "clipboard",
            action: key === "c" ? "copy" : key === "x" ? "cut" : "paste",
          });
          event.preventDefault();
          return;
        }
        if ((event.metaKey || event.ctrlKey) && key === "enter") {
          commitPendingEdits();
          event.preventDefault();
          return;
        }
        if (key === "p" && state.mode === "layer-edit") {
          setActiveTool("pencil");
          event.preventDefault();
          return;
        }
        if (key === "m" && state.mode === "layer-edit") {
          setActiveTool("move");
          event.preventDefault();
          return;
        }
        if (key === "l" && state.mode === "layer-edit") {
          setActiveTool("crop_lasso");
          event.preventDefault();
          return;
        }
        if (key === "r" && state.mode === "layer-edit") {
          setActiveTool("crop_rect");
          event.preventDefault();
          return;
        }
        if (key === "o" && state.mode === "layer-edit") {
          setActiveTool("crop_ellipse");
          event.preventDefault();
          return;
        }
        if (key === "i" && state.mode !== "segmentation-center") {
          setActiveTool("eyedropper");
          event.preventDefault();
          return;
        }
        if (key === "w" && state.mode !== "segmentation-center") {
          setActiveTool("wand");
          event.preventDefault();
          return;
        }
        if (key === "e" && state.mode !== "segmentation-center") {
          setActiveTool("eraser");
          event.preventDefault();
          return;
        }
        if (key === "g") {
          setGuidesVisible(!state.showGuides, true);
          event.preventDefault();
          return;
        }
        if (key === "a" && state.mode === "segmentation-center") {
          setObjectOffset(state.homeOffsetX, state.homeOffsetY);
          emitValue({
            eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
            type: "toolbar",
            action: "autocenter",
            mode: state.mode,
            offsetX: state.homeOffsetX,
            offsetY: state.homeOffsetY,
          });
          event.preventDefault();
          return;
        }
        if (key === "c" && state.mode === "segmentation-center") {
          emitValue({
            eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
            type: "toolbar",
            action: "autocrop",
            mode: state.mode,
          });
          event.preventDefault();
          return;
        }
        if (key === "r" && state.mode === "segmentation-center") {
          setObjectOffset(state.homeOffsetX, state.homeOffsetY);
          emitValue({
            eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
            type: "toolbar",
            action: "reset-transform",
            mode: state.mode,
            offsetX: state.homeOffsetX,
            offsetY: state.homeOffsetY,
          });
          event.preventDefault();
          return;
        }
        if (key === "escape" && state.mode === "layer-edit" && state.floatingSelection) {
          emitValue({
            eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
            type: "floating-selection",
            action: "cancel",
            tool: "move",
          });
          event.preventDefault();
          return;
        }
        if (key === "escape" && state.mode === "layer-edit") {
          emitValue({
            eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
            type: "selection-command",
            action: "deselect",
          });
          event.preventDefault();
          return;
        }
        if (
          state.mode === "segmentation-center"
          && state.allowDrag
          && key.startsWith("arrow")
          && ["arrowleft", "arrowright", "arrowup", "arrowdown"].includes(key)
        ) {
          const step = event.shiftKey ? 5 : 1;
          const deltaX = key === "arrowleft" ? -step : key === "arrowright" ? step : 0;
          const deltaY = key === "arrowup" ? -step : key === "arrowdown" ? step : 0;
          nudgeObject(deltaX, deltaY);
          event.preventDefault();
          return;
        }
        if (state.mode === "segmentation-center") {
          return;
        }
        if (state.mode === "segmentation-cut") {
          return;
        }
        if (state.mode === "layer-edit" && (key === "backspace" || key === "delete")) {
          emitValue({
            eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
            type: "clipboard",
            action: "cut",
          });
          event.preventDefault();
          return;
        }
        if (key === "[") {
          setBrushRadius(state.brushRadius - 1, false);
          event.preventDefault();
          return;
        }
        if (key === "]") {
          setBrushRadius(state.brushRadius + 1, false);
          event.preventDefault();
          return;
        }
        if (key === "escape") {
          emitValue({
            eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
            type: "key",
            key: "Escape",
            ...modifiers(event),
          });
          event.preventDefault();
          return;
        }
        if (key === "backspace" || key === "delete") {
          emitValue({
            eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
            type: "key",
            key: event.key,
            ...modifiers(event),
          });
          event.preventDefault();
        }
      });

      document.getElementById("toolbar").addEventListener("click", (event) => {
        const button = event.composedPath().find(
          (target) => target instanceof HTMLElement && target.matches("button[data-action]"),
        ) || event.target.closest?.("button[data-action]");
        if (!button) {
          return;
        }
        const action = button.dataset.action;
        if (action === "undo" || action === "redo") {
          emitHistory(action);
          focusCanvas();
          return;
        }
        if (action === "pixel-action") {
          emitValue({
            eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
            type: "pixel-action",
            action: button.dataset.pixelAction || "",
            radius: 1,
            minimumNeighbors: 2,
          });
          focusCanvas();
          return;
        }
        if (action === "tool") {
          const tool = button.dataset.tool || "wand";
          setActiveTool(tool);
          focusCanvas();
          return;
        }
        if (action === "commit-edits") {
          commitPendingEdits();
          focusCanvas();
          return;
        }
        if (action === "brush-radius-up") {
          setBrushRadius(state.brushRadius + 1, false);
          focusCanvas();
          return;
        }
        if (action === "brush-radius-down") {
          setBrushRadius(state.brushRadius - 1, false);
          focusCanvas();
          return;
        }
        if (action === "zoom-in") {
          setZoom(state.zoom + 1, false);
          focusCanvas();
          return;
        }
        if (action === "zoom-out") {
          setZoom(state.zoom - 1, false);
          focusCanvas();
          return;
        }
        if (action === "fit") {
          setZoom(computeFitZoom(), false);
          scheduleViewportFocus();
          focusCanvas();
          return;
        }
        if (action === "autocenter") {
          setObjectOffset(state.homeOffsetX, state.homeOffsetY);
          emitValue({
            eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
            type: "toolbar",
            action: "autocenter",
            mode: state.mode,
            offsetX: state.homeOffsetX,
            offsetY: state.homeOffsetY,
          });
          focusCanvas();
          return;
        }
        if (action === "autocrop") {
          emitValue({
            eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
            type: "toolbar",
            action: "autocrop",
            mode: state.mode,
          });
          focusCanvas();
          return;
        }
        if (action === "reset-transform") {
          setObjectOffset(state.homeOffsetX, state.homeOffsetY);
          emitValue({
            eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
            type: "toolbar",
            action: "reset-transform",
            mode: state.mode,
            offsetX: state.homeOffsetX,
            offsetY: state.homeOffsetY,
          });
          focusCanvas();
          return;
        }
        if (action === "toggle-guides") {
          setGuidesVisible(!state.showGuides, true);
          focusCanvas();
        }
      });

      timelinePlayButton.addEventListener("click", () => {
        togglePlayback();
        focusCanvas();
      });

      guideTargetLayer.addEventListener("change", () => {
        state.showCellCenter = guideTargetLayer.checked;
        updateGuidesGeometry();
        emitValue({
          eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          type: "toolbar",
          action: "toggle-cell-center",
          mode: state.mode,
          showCellCenter: state.showCellCenter,
        });
        focusCanvas();
      });

      guideFrameLayer.addEventListener("change", () => {
        state.showFrameGuide = guideFrameLayer.checked;
        updateGuidesGeometry();
        emitValue({
          eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          type: "toolbar",
          action: "toggle-frame-guide",
          mode: state.mode,
          showFrameGuide: state.showFrameGuide,
        });
        focusCanvas();
      });

      guideCurrentAnchorLayer.addEventListener("change", () => {
        state.showBodyAnchor = guideCurrentAnchorLayer.checked;
        updateGuidesGeometry();
        emitValue({
          eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          type: "toolbar",
          action: "toggle-body-anchor",
          mode: state.mode,
          showBodyAnchor: state.showBodyAnchor,
        });
        focusCanvas();
      });

      guideTargetAnchorLayer.addEventListener("change", () => {
        state.showTargetAnchor = guideTargetAnchorLayer.checked;
        updateGuidesGeometry();
        emitValue({
          eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          type: "toolbar",
          action: "toggle-target-anchor",
          mode: state.mode,
          showTargetAnchor: state.showTargetAnchor,
        });
        focusCanvas();
      });

      guideGroundLayer.addEventListener("change", () => {
        state.showGroundLine = guideGroundLayer.checked;
        updateGuidesGeometry();
        emitValue({
          eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          type: "toolbar",
          action: "toggle-ground-line",
          mode: state.mode,
          showGroundLine: state.showGroundLine,
        });
        focusCanvas();
      });

      guideAnchorDeltaLayer.addEventListener("change", () => {
        state.showAnchorDelta = guideAnchorDeltaLayer.checked;
        updateModeUI();
        updateGuidesGeometry();
        emitValue({
          eventId: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          type: "toolbar",
          action: "toggle-anchor-delta",
          mode: state.mode,
          showAnchorDelta: state.showAnchorDelta,
        });
        focusCanvas();
      });

      guideOpacity.addEventListener("input", () => {
        setGuideOpacity(finiteNumber(guideOpacity.value, 85) / 100);
      });

      guideOpacity.addEventListener("change", () => {
        setGuideOpacity(finiteNumber(guideOpacity.value, 85) / 100, true);
        focusCanvas();
      });

      window.addEventListener("message", async (event) => {
        const message = event.data;
        if (!message || message.type !== RENDER) {
          return;
        }
        const args = message.args || {};
        const renderId = ++latestRenderId;
        state.canUndo = !!args.canUndo;
        state.canRedo = !!args.canRedo;
        state.undoLabel = String(args.undoLabel || "");
        state.redoLabel = String(args.redoLabel || "");
        updateHistoryControls();
        if (Object.prototype.hasOwnProperty.call(args, "frameToken")) {
          state.frameToken = String(args.frameToken || "");
        }
        if (hasOwn(args, "studioLayers")) {
          const incomingLayers = normalizeStudioLayers(args.studioLayers);
          const incomingLayerIds = incomingLayers.map((entry) => entry.id);
          const pendingOrder = state.studioOrderPending;
          const orderAcknowledged = !!pendingOrder
            && sameCutPositions(incomingLayerIds, pendingOrder.layerIds);
          const orderExpired = !!pendingOrder && Date.now() - pendingOrder.createdAt > 4000;
          if (!pendingOrder || orderAcknowledged || orderExpired) {
            state.studioLayers = incomingLayers;
            if (orderAcknowledged || orderExpired) {
              state.studioOrderPending = null;
            }
          }
        }
        const incomingLayerId = hasOwn(args, "activeLayerId")
          ? String(args.activeLayerId ?? "")
          : state.activeLayerId;
        const incomingFrame = hasOwn(args, "activeFrame")
          ? Math.max(0, Math.round(finiteNumber(args.activeFrame, 0)))
          : state.activeFrame;
        const pendingSelection = state.studioSelectionPending;
        const selectionAcknowledged = !!pendingSelection
          && incomingLayerId === pendingSelection.layerId
          && (!pendingSelection.frameSpecific || incomingFrame === pendingSelection.frameIndex);
        const selectionExpired = !!pendingSelection
          && Date.now() - pendingSelection.createdAt > 4000;
        if (!pendingSelection || selectionAcknowledged || selectionExpired) {
          state.activeLayerId = incomingLayerId;
          state.activeFrame = incomingFrame;
          if (selectionAcknowledged || selectionExpired) {
            state.studioSelectionPending = null;
          }
        }
        if (hasOwn(args, "frameCount")) {
          state.frameCount = Math.max(0, Math.round(finiteNumber(args.frameCount, 0)));
        }
        if (Array.isArray(args.selectedFrames)) {
          state.selectedFrames = args.selectedFrames
            .map((value) => Math.max(0, Math.round(finiteNumber(value, 0))))
            .filter((value, index, values) => values.indexOf(value) === index);
        }
        if (state.activeFrameToken && state.activeFrameToken !== state.frameToken) {
          frameStateByToken.set(state.activeFrameToken, captureFrameState());
        }
        const frameChanged = state.frameToken !== state.activeFrameToken;
        switchPendingEditContext(editContextKey());
        if (frameChanged) {
          state.cutCommitPending = null;
          state.floatingTransformPending = null;
        }
        state.width = Math.max(1, Number(args.width || 1));
        state.height = Math.max(1, Number(args.height || 1));
        const incomingTool = normalizeTool(String(args.tool || state.tool || "wand"));
        if (!state.initialized || frameChanged || incomingTool !== state.serverTool) {
          state.tool = incomingTool;
        }
        state.serverTool = incomingTool;
        setMode(String(args.mode || state.mode || "background"), false);
        const incomingBrushRadius = Math.max(
          1,
          Math.round(Number(args.brushRadius || state.brushRadius || 5)),
        );
        if (
          !state.initialized
          || frameChanged
          || incomingBrushRadius !== state.serverBrushRadius
        ) {
          state.brushRadius = incomingBrushRadius;
        }
        state.serverBrushRadius = incomingBrushRadius;
        state.sample = Array.isArray(args.sample) ? args.sample.slice(0, 4) : null;
        state.paintColor = Array.isArray(args.paintColor)
          ? args.paintColor.slice(0, 4)
          : (state.sample || state.paintColor);
        const incomingOffsetX = hasOwn(args, "offsetX")
          ? Math.round(Number(args.offsetX || 0))
          : state.offsetX;
        const incomingOffsetY = hasOwn(args, "offsetY")
          ? Math.round(Number(args.offsetY || 0))
          : state.offsetY;
        const pendingTransform = state.transformCommitPending;
        const transformAcknowledged = !!pendingTransform
          && (
            (
              incomingOffsetX === pendingTransform.offsetX
              && incomingOffsetY === pendingTransform.offsetY
            )
            || (
              pendingTransform.mode === "segmentation-center"
              && (
                (args.overlay || null) !== pendingTransform.overlayUrl
                || (args.image || null) !== pendingTransform.imageUrl
                || state.frameToken !== pendingTransform.frameToken
              )
            )
          );
        const transformExpired = !!pendingTransform
          && Date.now() - pendingTransform.createdAt > 4000;
        if (!pendingTransform || transformAcknowledged || transformExpired) {
          state.offsetX = incomingOffsetX;
          state.offsetY = incomingOffsetY;
          if (transformAcknowledged || transformExpired) {
            state.transformCommitPending = null;
          }
        }
        if (Object.prototype.hasOwnProperty.call(args, "homeOffsetX")) {
          state.homeOffsetX = Math.round(Number(args.homeOffsetX || 0));
        } else {
          state.homeOffsetX = state.offsetX;
        }
        if (Object.prototype.hasOwnProperty.call(args, "homeOffsetY")) {
          state.homeOffsetY = Math.round(Number(args.homeOffsetY || 0));
        } else {
          state.homeOffsetY = state.offsetY;
        }
        if (Object.prototype.hasOwnProperty.call(args, "showGuides")) {
          state.showGuides = !!args.showGuides;
        }
        if (hasOwn(args, "guideOpacity")) {
          const rawOpacity = finiteNumber(args.guideOpacity, state.guideOpacity);
          state.guideOpacity = Math.max(0.1, Math.min(1, rawOpacity > 1 ? rawOpacity / 100 : rawOpacity));
        }
        if (hasOwn(args, "showCellCenter")) {
          state.showCellCenter = !!args.showCellCenter;
        } else if (hasOwn(args, "showTargetGuide")) {
          state.showCellCenter = !!args.showTargetGuide;
        }
        if (hasOwn(args, "showFrameGuide")) {
          state.showFrameGuide = !!args.showFrameGuide;
        }
        if (hasOwn(args, "showBodyAnchor")) {
          state.showBodyAnchor = !!args.showBodyAnchor;
        } else if (hasOwn(args, "showAnchorGuides")) {
          state.showBodyAnchor = !!args.showAnchorGuides;
        }
        if (hasOwn(args, "showTargetAnchor")) {
          state.showTargetAnchor = !!args.showTargetAnchor;
        } else if (hasOwn(args, "showAnchorGuides")) {
          state.showTargetAnchor = !!args.showAnchorGuides;
        }
        if (hasOwn(args, "showGroundLine")) {
          state.showGroundLine = !!args.showGroundLine;
        }
        state.groundLineY = firstFinite(args, ["groundLineY"], null);
        const currentAnchor = args.currentAnchor || args.bodyAnchor || args.currentBodyAnchor || {};
        const targetAnchor = args.targetAnchor || args.targetBodyAnchor || {};
        state.currentAnchorX = firstFinite(
          args,
          ["currentAnchorX", "bodyAnchorX", "currentBodyAnchorX"],
          finiteNumber(currentAnchor.x, null),
        );
        state.currentAnchorY = firstFinite(
          args,
          ["currentAnchorY", "bodyAnchorY", "currentBodyAnchorY"],
          finiteNumber(currentAnchor.y, null),
        );
        state.targetAnchorX = firstFinite(
          args,
          ["targetAnchorX", "targetBodyAnchorX"],
          finiteNumber(targetAnchor.x, null),
        );
        state.targetAnchorY = firstFinite(
          args,
          ["targetAnchorY", "targetBodyAnchorY"],
          finiteNumber(targetAnchor.y, null),
        );
        if (hasOwn(args, "showAnchorDelta")) {
          state.showAnchorDelta = !!args.showAnchorDelta;
        }
        state.anchorOffsetX = state.offsetX;
        state.anchorOffsetY = state.offsetY;
        if (Object.prototype.hasOwnProperty.call(args, "allowDrag")) {
          state.allowDrag = !!args.allowDrag;
        }
        if (hasOwn(args, "allowCutDrag")) {
          state.allowCutDrag = !!args.allowCutDrag;
        }
        if (Object.prototype.hasOwnProperty.call(args, "showAutocenter")) {
          state.showAutocenter = !!args.showAutocenter;
        }
        if (Object.prototype.hasOwnProperty.call(args, "showAutocrop")) {
          state.showAutocrop = !!args.showAutocrop;
        }
        if (Object.prototype.hasOwnProperty.call(args, "fitOnLoad")) {
          state.fitOnLoad = !!args.fitOnLoad;
        }
        if (Object.prototype.hasOwnProperty.call(args, "fitToken")) {
          state.fitToken = String(args.fitToken || "");
        }
        const incomingLegacyCuts = normalizedIncomingCutPositions(args.cutPositions);
        const incomingCutsX = hasOwn(args, "cutPositionsX")
          ? normalizedIncomingCutPositions(args.cutPositionsX)
          : incomingLegacyCuts;
        const incomingCutsY = normalizedIncomingCutPositions(args.cutPositionsY);
        const pendingCuts = state.cutCommitPending;
        const pendingAcknowledged = !!pendingCuts
          && sameCutPositions(incomingCutsX, pendingCuts.x)
          && sameCutPositions(incomingCutsY, pendingCuts.y);
        const pendingExpired = !!pendingCuts && Date.now() - pendingCuts.createdAt > 4000;
        if (!pendingCuts || pendingAcknowledged || pendingExpired) {
          if (hasOwn(args, "cutPositions") && Array.isArray(args.cutPositions)) {
            state.cutPositions = incomingLegacyCuts;
            state.cutPositionsX = state.cutPositions.slice();
          }
          if (hasOwn(args, "cutPositionsX") && Array.isArray(args.cutPositionsX)) {
            state.cutPositionsX = incomingCutsX;
            state.cutPositions = state.cutPositionsX.slice();
          }
          if (hasOwn(args, "cutPositionsY") && Array.isArray(args.cutPositionsY)) {
            state.cutPositionsY = incomingCutsY;
          }
          if (pendingAcknowledged || pendingExpired) {
            state.cutCommitPending = null;
          }
        }
        try {
          let focusAfterRender = false;
          const imageUrl = args.image || null;
          const overlayUrl = args.overlay || null;
          const moveBaseUrl = args.moveBase || null;
          const floatingSelectionUrl = args.floatingSelection || null;
          const floatingHighlightUrl = args.floatingHighlight || null;
          const animationFrameUrls = Array.isArray(args.animationFrames)
            ? args.animationFrames.filter((value) => typeof value === "string" && value)
            : [];
          const sameAnimationFrames = JSON.stringify(animationFrameUrls) === JSON.stringify(state.animationFrameUrls);
          const [image, overlay, moveBase, floatingSelection, floatingHighlight, animationFrames] = await Promise.all([
            imageUrl === state.imageUrl ? state.image : loadImage(imageUrl),
            overlayUrl === state.overlayUrl ? state.overlay : loadImage(overlayUrl),
            moveBaseUrl === state.moveBaseUrl ? state.moveBase : loadImage(moveBaseUrl),
            floatingSelectionUrl === state.floatingSelectionUrl
              ? state.floatingSelection
              : loadImage(floatingSelectionUrl),
            floatingHighlightUrl === state.floatingHighlightUrl
              ? state.floatingHighlight
              : loadImage(floatingHighlightUrl),
            sameAnimationFrames
              ? state.animationFrames
              : Promise.all(animationFrameUrls.map((url) => loadImage(url))),
          ]);
          if (renderId !== latestRenderId) {
            return;
          }
          state.image = image;
          state.imageUrl = imageUrl;
          state.overlay = overlay;
          state.overlayUrl = overlayUrl;
          state.moveBase = moveBase;
          state.moveBaseUrl = moveBaseUrl;
          state.floatingSelection = floatingSelection;
          state.floatingSelectionUrl = floatingSelectionUrl;
          state.floatingHighlight = floatingHighlight;
          state.floatingHighlightUrl = floatingHighlightUrl;
          state.animationFrames = animationFrames.filter(Boolean);
          state.animationFrameUrls = animationFrameUrls;
          state.animationFps = Math.max(1, Math.min(60, Math.round(finiteNumber(args.animationFps, 8))));
          state.animationDurations = Array.isArray(args.animationDurations)
            ? args.animationDurations.map((value) => Math.max(16, Math.round(finiteNumber(value, 125))))
            : [];
          timelinePlayButton.disabled = state.animationFrames.length === 0;
          if (!state.animationFrames.length && state.playbackTimer) {
            stopPlayback();
          }
          const incomingFloatingX = Math.round(Number(args.floatingSelectionX || 0));
          const incomingFloatingY = Math.round(Number(args.floatingSelectionY || 0));
          const pendingFloating = state.floatingTransformPending;
          const floatingAcknowledged = !!pendingFloating && (
            floatingSelectionUrl !== pendingFloating.selectionUrl
            || (
              incomingFloatingX === pendingFloating.x
              && incomingFloatingY === pendingFloating.y
            )
          );
          const floatingExpired = !!pendingFloating
            && Date.now() - pendingFloating.createdAt > 4000;
          if (!pendingFloating || floatingAcknowledged || floatingExpired) {
            state.floatingSelectionX = incomingFloatingX;
            state.floatingSelectionY = incomingFloatingY;
            if (floatingAcknowledged || floatingExpired) {
              state.floatingTransformPending = null;
            }
          }
          state.floatingSelectionStartX = state.floatingSelectionX;
          state.floatingSelectionStartY = state.floatingSelectionY;
          state.floatingSelectionBounds = Array.isArray(args.floatingSelectionBounds)
            ? args.floatingSelectionBounds.map((value) => Math.round(Number(value)))
            : null;
          const committedEdits = state.committedEditsPending;
          if (committedEdits && (
            imageUrl !== committedEdits.imageUrl
            || Date.now() - committedEdits.createdAt > 4000
          )) {
            state.committedEditsPending = null;
          }
          if (frameChanged) {
            state.activeFrameToken = state.frameToken;
            const restored = restoreFrameState(frameStateByToken.get(state.frameToken), args);
            if (!restored && state.mode === "segmentation-center") {
              state.zoom = Math.max(1, Math.round(Number(args.zoom || state.zoom || 8)));
            }
          }
          if (
            (state.mode === "segmentation-center" || state.mode === "layer-edit")
            && state.fitOnLoad
            && state.fitToken
            && state.fitToken !== state.fitAppliedToken
          ) {
            state.fitAppliedToken = state.fitToken;
            state.zoom = computeFitZoom();
            state.initialized = true;
            focusAfterRender = true;
          } else if (!state.initialized) {
            state.zoom = Math.max(1, Math.round(Number(args.zoom || state.zoom || 8)));
            state.initialized = true;
          }
          redraw();
          if (focusAfterRender) {
            scheduleViewportFocus();
          }
        } catch (error) {
          console.error("pixel editor render failed", error);
        }
      });

      window.addEventListener("DOMContentLoaded", () => {
        sendReady();
        setFrameHeight();
      });
      window.addEventListener("load", () => {
        sendReady();
        setFrameHeight();
      });
      setTimeout(() => {
        sendReady();
        setFrameHeight();
      }, 50);
    </script>
  </body>
</html>
